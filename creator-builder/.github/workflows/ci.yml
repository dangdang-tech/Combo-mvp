# CI（O-07）。注意：GitHub Actions 只识别 <repo-root>/.github/workflows/，而 workspace 根在 creator-builder/，
# 故工作流文件物理放仓库根，但所有步骤经 `working-directory: creator-builder` 限定到 monorepo 内（与「全部放 creator-builder/」意图一致）。
#
# 两个 job：
#   gate    —— install / lint(含分层依赖规则) / typecheck / build / test / openapi 生成 / compose 配置自查。无外部依赖、必过才允许合并。
#   integration —— 起 PG/Redis 双实例/MinIO 临时 service 容器，跑 db 迁移集成 + redis 双实例分工断言（O-05/O-07）。
name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: creator-builder

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint / typecheck / build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: creator-builder/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared first (apps depend on its dist + .d.ts)
        run: pnpm -F @cb/shared build

      # eslint 含分层依赖规则（eslint.config.js）：worker/consumer/sweeper 后台进程不得 import api 的 HTTP app/路由（违反即失败、不许合并）。
      - name: Lint (incl. layering rules)
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (all packages + apps)
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: OpenAPI generation smoke (3.1 doc produces)
        run: pnpm -F @cb/scripts openapi:dump > /tmp/openapi.json && node -e "const d=require('/tmp/openapi.json'); if(d.openapi!=='3.1.0') process.exit(1); if(!d.components||!d.components.schemas) process.exit(1); console.log('openapi 3.1 schemas:', Object.keys(d.components.schemas).length)"

      - name: Compose config self-check (structural, no up)
        run: docker compose -f infra/docker-compose.yml config -q && echo "compose config valid"

      - name: ShellCheck scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh scripts/integration/*.sh infra/entrypoint.sh infra/postgres/init-logto-db.sh infra/minio/init-buckets.sh

  integration:
    name: integration (db migrate + redis dual)
    runs-on: ubuntu-latest
    needs: gate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
          POSTGRES_DB: agora
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U agora" --health-interval 5s --health-timeout 3s --health-retries 10
      redis_queue:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
      redis_hot:
        image: redis:7
        ports: ['6380:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: creator-builder/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install psql + redis-cli clients
        run: sudo apt-get update && sudo apt-get install -y postgresql-client redis-tools

      # Service 容器以默认配置起（无法挂自定义 conf），故用 CONFIG SET 注入双实例对立策略后再断言。
      - name: Apply redis dual-instance policies (service containers)
        run: |
          redis-cli -h localhost -p 6379 config set maxmemory-policy noeviction
          redis-cli -h localhost -p 6379 config set appendonly yes
          redis-cli -h localhost -p 6380 config set maxmemory-policy allkeys-lru

      - name: Integration · db migrate
        env:
          DATABASE_URL: postgres://agora:agora@localhost:5432/agora
        run: bash scripts/integration/db-migrate.sh

      - name: Integration · redis dual
        env:
          REDIS_QUEUE_HOST: localhost
          REDIS_QUEUE_PORT: '6379'
          REDIS_HOT_HOST: localhost
          REDIS_HOT_PORT: '6380'
        run: bash scripts/integration/redis-dual.sh

  image:
    name: docker image build (api + web)
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
      # defaults.working-directory=creator-builder：build context 与 -f 路径均相对 creator-builder/。
      - name: Build api image (one image, four entrypoints via PROCESS)
        run: docker build -f infra/Dockerfile.api -t cb-api:ci .
      - name: Build web image (nginx static + reverse proxy)
        run: docker build -f infra/Dockerfile.web -t cb-web:ci .
