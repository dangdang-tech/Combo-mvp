<!-- @dsCard group="05 · 消费运行时 · 占卜示例" name="⓪ 首屏首次态 · KOL 链接直达" subtitle="消费者点开 KOL 分享链接的第一屏：全屏居中聚焦（DEC-19）+ 创作者署名（DEC-24）+ artifact 入口，中性对话框收纳为右下角胶囊，产出首个结果后停靠" -->
<!doctype html>
<html lang="zh">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>占卜 · 首屏（KOL 链接直达）</title></head>
<body>
<style>
/* ============================================================
   Combo 砖红品牌 token（暖纸底 #f5f3ef + 砖红 #a73718 + 墨；外壳/对话框用）
   —— token 块内允许裸 hex ——
   ============================================================ */
:root {
  --cb-paper: #fbfaf6;
  --cb-bg: #f5f3ef;
  --cb-surface: #faf8f4;
  --cb-surface-raised: #ffffff;
  --cb-muted-bg: #eeeae3;
  --cb-fg: #1c1b19;
  --cb-muted: #66706c;
  --cb-line-1: #dcd7cf;
  --cb-line-2: #e7e2d9;
  --cb-line-3: #ece7df;
  --cb-border: var(--cb-line-1);
  --cb-skeleton: #eeeae3;
  --cb-grid: rgba(220, 214, 205, 0.72);
  --cb-accent: #a73718;
  --cb-accent-strong: #8f2d14;
  --cb-accent-pressed: #6e210f;
  --cb-accent-soft: #f7e7e1;
  --cb-accent-tint: #f4d4c9;
  --cb-focus-ring: #7fa59d;
  --cb-ok: #4f6f52;
  --cb-warn: #7a5317;
  --cb-danger: #b3261e;
  --cb-radius-control: 6px;
  --cb-radius-card: 7px;
  --cb-radius-hero: 18px;
  --cb-radius-pill: 999px;
  --cb-shadow-surface: 0 2px 8px rgba(28, 27, 25, 0.04);
  --cb-shadow-hero: 0 8px 24px rgba(28, 27, 25, 0.06);
  --cb-shadow-overlay: 0 12px 28px rgba(28, 27, 25, 0.1);
  --cb-font-brand: 'Fraunces', 'Noto Serif SC', serif;
  --cb-font-serif: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
  --cb-font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --cb-font-mono: 'Geist Mono', ui-monospace, 'SFMono-Regular', 'Roboto Mono', monospace;
  --cb-space-1: 4px;
  --cb-space-2: 8px;
  --cb-space-3: 10px;
  --cb-space-4: 14px;
  --cb-space-5: 20px;
  --cb-space-6: 26px;
  --cb-space-7: 32px;
  --cb-space-8: 40px;
  --cb-text-xs: 11px;
  --cb-text-sm: 12px;
  --cb-text-md: 13px;
  --cb-text-lg: 14px;
  --cb-text-xl: 18px;
  --cb-text-2xl: 24px;
  --cb-text-3xl: 32px;
  --cb-bar-w: 3px;
  --cb-accent-contrast: #ffffff;
  --cb-duration-fast: 120ms;
  --cb-duration-base: 200ms;
  --cb-duration-slow: 320ms;
  --cb-ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --cb-ease-decelerate: cubic-bezier(0, 0, 0.2, 1);
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--cb-bg);
  color: var(--cb-fg);
  font-family: var(--cb-font-sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ============================================================
   页面外壳 —— 全屏首次态（无侧栏，居中聚焦）
   纸感网格底：48px 细格，唯一合法的 linear-gradient 用途
   ============================================================ */
.entry-page {
  position: relative;
  width: 1440px;
  min-height: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background:
    linear-gradient(var(--cb-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--cb-grid) 1px, transparent 1px);
  background-size: 48px 48px;
  background-color: var(--cb-bg);
  overflow: hidden;
}

/* 顶部极简栏：字标靠左（DEC-18） */
.entry-top {
  flex: none;
  display: flex;
  align-items: center;
  padding: var(--cb-space-5) var(--cb-space-7);
}
.entry-wordmark { height: 22px; width: auto; display: block; }
.entry-top-right { margin-left: auto; display: flex; align-items: center; gap: var(--cb-space-5); }
.entry-top-link {
  font-family: var(--cb-font-mono); font-size: var(--cb-text-xs);
  color: var(--cb-muted); text-decoration: none; letter-spacing: 0.04em;
  display: inline-flex; align-items: center; gap: var(--cb-space-1);
}
.entry-top-link:hover { color: var(--cb-fg); }
.entry-top-link svg { width: 13px; height: 13px; }

/* 中间聚焦区 */
.entry-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--cb-space-6);
  padding: var(--cb-space-6) var(--cb-space-6) var(--cb-space-8);
}

/* —— KOL / 创作者署名 + agent 身份 —— */
.entry-hero { display: flex; flex-direction: column; align-items: center; text-align: center; gap: var(--cb-space-3); max-width: 620px; }
.entry-invite {
  display: inline-flex; align-items: center; gap: var(--cb-space-2);
  padding: var(--cb-space-1) var(--cb-space-2) var(--cb-space-1) var(--cb-space-1);
  background: var(--cb-surface-raised);
  border: 1px solid var(--cb-line-1);
  border-radius: var(--cb-radius-pill);
  box-shadow: var(--cb-shadow-surface);
}
.entry-kol-ava {
  width: 24px; height: 24px; flex: none; border-radius: var(--cb-radius-pill);
  background: var(--cb-accent); color: var(--cb-accent-contrast);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--cb-font-serif); font-size: var(--cb-text-xs);
}
.entry-invite-text { font-size: var(--cb-text-xs); color: var(--cb-muted); padding-right: var(--cb-space-2); }
.entry-invite-text b { color: var(--cb-fg); font-weight: 600; }

.entry-eyebrow {
  font-family: var(--cb-font-mono); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--cb-muted);
}
.entry-name {
  margin: 0;
  font-family: var(--cb-font-serif); font-weight: 600;
  font-size: var(--cb-text-3xl); line-height: 1.1; color: var(--cb-fg);
}
.entry-tagline {
  margin: 0; max-width: 42ch;
  font-family: var(--cb-font-serif); font-size: var(--cb-text-lg); line-height: 1.6; color: var(--cb-muted);
}

/* ============================================================
   创作者占卜 artifact —— 生日录入卡（首屏聚焦精简版）
   —— 占卜 artifact 自有色（深靛/柔金/羊皮纸），DEC-11 不约束外壳 token ——
   —— 与 consumer-oracle-input / -result 保持同一套 --or-* 调色板 ——
   ============================================================ */
.or-card {
  --or-night: #1b1930;
  --or-indigo: #2e2b52;
  --or-gold: #c7a24e;
  --or-parchment: #f7f2e7;
  --or-ink: #2a2740;
  --or-muted: #6b688a;
  --or-line: #e6dfd0;
  width: 600px;
  background: var(--or-parchment);
  border-radius: var(--cb-radius-hero);
  box-shadow: var(--cb-shadow-hero);
  overflow: hidden;
  color: var(--or-ink);
}
.or-sky {
  position: relative;
  padding: var(--cb-space-6) var(--cb-space-6) var(--cb-space-5);
  background: var(--or-night);
  background-image: radial-gradient(120% 90% at 82% -10%, color-mix(in srgb, var(--or-indigo) 88%, transparent), transparent 60%);
  overflow: hidden;
}
.or-star { position: absolute; color: var(--or-gold); pointer-events: none; }
.or-moon { position: absolute; top: var(--cb-space-5); right: var(--cb-space-6); width: 30px; height: 30px; color: var(--or-gold); opacity: 0.9; }
.or-eyebrow {
  position: relative;
  font-family: var(--cb-font-mono); font-size: 11px; letter-spacing: 0.22em;
  color: color-mix(in srgb, var(--or-gold) 78%, transparent);
  text-transform: uppercase;
}
.or-title {
  position: relative;
  margin: var(--cb-space-3) 0 var(--cb-space-2);
  font-family: var(--cb-font-serif); font-weight: 600; font-size: var(--cb-text-2xl);
  line-height: 1.2;
  color: color-mix(in srgb, var(--or-gold) 62%, #ffffff);
}
.or-sub {
  position: relative; margin: 0; max-width: 40ch;
  font-family: var(--cb-font-serif); font-size: var(--cb-text-sm); line-height: 1.6;
  color: var(--or-muted);
}
.or-body { padding: var(--cb-space-6); display: flex; flex-direction: column; gap: var(--cb-space-5); }
.or-seg { display: inline-flex; align-self: flex-start; padding: 3px; gap: 2px; background: color-mix(in srgb, var(--or-ink) 7%, var(--or-parchment)); border: 1px solid var(--or-line); border-radius: var(--cb-radius-pill); }
.or-seg-btn { display: inline-flex; align-items: center; gap: var(--cb-space-1); padding: 6px 18px; border: none; background: transparent; border-radius: var(--cb-radius-pill); font-family: var(--cb-font-sans); font-size: var(--cb-text-sm); color: var(--or-muted); cursor: pointer; }
.or-seg-btn svg { width: 13px; height: 13px; }
.or-seg-btn--on { background: #ffffff; color: var(--or-ink); font-weight: 500; box-shadow: var(--cb-shadow-surface); }
.or-form { display: flex; flex-direction: column; gap: var(--cb-space-4); }
.or-field-group { display: flex; flex-direction: column; gap: var(--cb-space-2); }
.or-label { font-family: var(--cb-font-mono); font-size: var(--cb-text-xs); letter-spacing: 0.04em; color: var(--or-muted); }
.or-label-opt { color: color-mix(in srgb, var(--or-muted) 72%, transparent); }
.or-field { position: relative; display: block; }
.or-input {
  width: 100%; padding: 11px 14px; padding-right: 42px;
  font-family: var(--cb-font-sans); font-size: var(--cb-text-md); color: var(--or-ink);
  background: color-mix(in srgb, #ffffff 55%, var(--or-parchment));
  border: 1px solid var(--or-line); border-radius: var(--cb-radius-control);
  outline: none;
  transition: border-color var(--cb-duration-fast) var(--cb-ease-standard), box-shadow var(--cb-duration-fast) var(--cb-ease-standard);
}
.or-input::placeholder { color: color-mix(in srgb, var(--or-muted) 66%, transparent); }
.or-input:focus { border-color: var(--or-gold); box-shadow: 0 0 0 3px color-mix(in srgb, var(--or-gold) 26%, transparent); }
.or-field-ic { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--or-gold); pointer-events: none; }
.or-cta {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--cb-space-2);
  width: 100%; margin-top: var(--cb-space-1); padding: 13px 20px;
  font-family: var(--cb-font-sans); font-weight: 600; font-size: var(--cb-text-md); letter-spacing: 0.02em;
  color: var(--or-night); background: var(--or-gold);
  border: none; border-radius: var(--cb-radius-control); cursor: pointer;
  transition: background var(--cb-duration-fast) var(--cb-ease-standard);
}
.or-cta:hover { background: color-mix(in srgb, var(--or-gold) 86%, var(--or-night)); }
.or-cta svg { width: 16px; height: 16px; }
.or-alt { border: 1px dashed var(--or-line); border-radius: var(--cb-radius-card); background: color-mix(in srgb, var(--or-parchment) 60%, #ffffff); padding: var(--cb-space-3) var(--cb-space-4); opacity: 0.9; }
.or-alt-head { display: flex; align-items: center; gap: var(--cb-space-2); font-family: var(--cb-font-mono); font-size: var(--cb-text-xs); letter-spacing: 0.04em; color: var(--or-muted); }
.or-alt-head svg { width: 12px; height: 12px; flex: none; }
.or-alt-body { margin-top: var(--cb-space-2); font-family: var(--cb-font-serif); font-size: var(--cb-text-sm); line-height: 1.6; color: color-mix(in srgb, var(--or-muted) 88%, transparent); }
.or-foot { display: flex; align-items: center; justify-content: center; gap: var(--cb-space-2); padding: var(--cb-space-4) var(--cb-space-6) var(--cb-space-6); color: var(--or-muted); }
.or-foot svg { width: 12px; height: 12px; flex: none; }
.or-foot span { font-size: var(--cb-text-xs); }

/* 首屏说明脚注（把 DEC-19 的过渡讲清楚，非产品必需文案） */
.entry-note {
  display: inline-flex; align-items: center; gap: var(--cb-space-2);
  font-family: var(--cb-font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--cb-muted);
}
.entry-note svg { width: 13px; height: 13px; flex: none; }

/* ============================================================
   收纳态伴随对话框 —— 右下角胶囊（中性，DEC-12 收纳态 / DEC-13 中性）
   —— 首屏聚焦时对话框让位于 artifact 入口，一键即可展开 ——
   ============================================================ */
.entry-chat-pill {
  position: absolute; right: var(--cb-space-7); bottom: var(--cb-space-7);
  display: inline-flex; align-items: center; gap: var(--cb-space-2);
  padding: var(--cb-space-2) var(--cb-space-3) var(--cb-space-2) var(--cb-space-2);
  background: var(--cb-surface-raised);
  border: 1px solid var(--cb-line-1);
  border-radius: var(--cb-radius-pill);
  box-shadow: var(--cb-shadow-overlay);
  cursor: pointer;
  transition: border-color var(--cb-duration-fast) var(--cb-ease-standard);
}
.entry-chat-pill:hover { border-color: var(--cb-muted); }
.entry-pill-ava {
  width: 28px; height: 28px; flex: none; border-radius: var(--cb-radius-pill);
  background: var(--cb-fg); color: var(--cb-surface-raised);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--cb-font-serif); font-size: var(--cb-text-sm);
}
.entry-pill-text { display: flex; flex-direction: column; line-height: 1.2; }
.entry-pill-name { font-size: var(--cb-text-sm); color: var(--cb-fg); font-weight: 600; }
.entry-pill-status { font-family: var(--cb-font-mono); font-size: 10px; color: var(--cb-muted); display: inline-flex; align-items: center; gap: 4px; }
.entry-pill-status .dot { width: 6px; height: 6px; border-radius: var(--cb-radius-pill); background: var(--cb-muted); }
.entry-pill-open { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin-left: var(--cb-space-1); border-radius: var(--cb-radius-control); color: var(--cb-muted); }
.entry-pill-open svg { width: 14px; height: 14px; }
</style>

  <!-- 中间聚焦区 -->
  <main class="entry-stage">

    <!-- KOL 署名 + agent 身份 -->
    <div class="entry-hero">
      <div class="entry-invite">

        <span class="entry-invite-text"><b>星野</b> 邀请你体验 ta 的经验体</span>
      </div>
      <div class="entry-eyebrow">占卜 · 经验体</div>
      <h1 class="entry-name">明日运势</h1>
      <p class="entry-tagline">把你的生日交给星野的命理经验体，排一张命盘，看看明天的运势走向。</p>
    </div>

    <!-- 创作者占卜 artifact —— 生日录入卡（首屏聚焦精简版） -->
    <section class="or-card" aria-label="生日录入卡">
      <div class="or-sky">
        <svg class="or-star" style="top:20px;left:32px;width:10px;height:10px;opacity:.9" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2 L13.4 9.6 L21 11 L13.4 12.4 L12 20 L10.6 12.4 L3 11 L10.6 9.6 Z"/></svg>

        <svg class="or-star" style="top:34px;left:210px;width:7px;height:7px;opacity:.7" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2 L13.4 9.6 L21 11 L13.4 12.4 L12 20 L10.6 12.4 L3 11 L10.6 9.6 Z"/></svg>
        <svg class="or-star" style="top:96px;left:330px;width:5px;height:5px;opacity:.5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2 L13.4 9.6 L21 11 L13.4 12.4 L12 20 L10.6 12.4 L3 11 L10.6 9.6 Z"/></svg>
        <svg class="or-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>
        <div class="or-eyebrow">排盘 · 第一步</div>
        <h2 class="or-title">先告诉我你的生日</h2>
        <p class="or-sub">我据此排你的命盘，解读明日运势。</p>
      </div>

      <div class="or-body">
        <div class="or-seg" role="tablist" aria-label="录入方式">
          <button class="or-seg-btn or-seg-btn--on" type="button" role="tab" aria-selected="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16"/><path d="M10 4v16"/></svg>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            一段话
          </button>
        </div>

        <div class="or-form">
          <div class="or-field-group">
            <label class="or-label">阳历生日</label>
            <span class="or-field">
              <input class="or-input" type="text" inputmode="numeric" placeholder="1995-03-05" aria-label="阳历生日">
              <svg class="or-field-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
            </span>
          </div>

          <div class="or-field-group">
            <label class="or-label">出生时间 <span class="or-label-opt">（可选）</span></label>
            <span class="or-field">
              <input class="or-input" type="text" inputmode="numeric" placeholder="03:20" aria-label="出生时间（可选）">
              <svg class="or-field-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            </span>
          </div>

          <button class="or-cta" type="button">

          </button>
        </div>

        <div class="or-alt">
          <div class="or-alt-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>

          <div class="or-alt-body">「1995 年三月初五凌晨，出生在杭州」</div>
        </div>
      </div>

      <div class="or-foot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>

    <div class="entry-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h6l2-3 3 6 2-3h5"/></svg>

    </div>
