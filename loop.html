<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora · Creator Builder</title>
<style>
:root{--ink:#14141A;--ink80:rgba(20,20,26,.82);--ink60:#6F6860;--ink40:rgba(20,20,26,.4);--ember:#A73718;--ember-soft:rgba(167,55,24,.08);--neutral:#F7F3EC;--paper:#FBF9F4;--muted:#F4F0E7;--raised:#FFFDF9;--line:#E1D8CA;--success:#0E6D52;--gold:#B8893A;--serif:"Georgia","Noto Serif SC",serif;--sans:-apple-system,"PingFang SC",sans-serif;--mono:ui-monospace,Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--neutral);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.serif{font-family:var(--serif)}.mono{font-family:var(--mono)}
/* top bar */
.top{height:62px;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:20}
.top .wm{font-family:var(--serif);font-size:20px;color:var(--ember)}
.top .sep{color:var(--ink40);margin:0 12px}.top .cb{font-size:15px;font-weight:600}
.top .right{margin-left:auto;display:flex;align-items:center;gap:14px}
.top .save{border:1px solid var(--line);background:var(--raised);border-radius:7px;padding:7px 14px;font-size:12.5px;cursor:pointer}
.top .av{width:32px;height:32px;border-radius:50%;background:var(--ember);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:34px 48px 80px}
@media(max-width:900px){.wrap{padding:24px 18px 60px}}
/* rail */
.rail{display:flex;align-items:center;margin-bottom:30px}
.rstep{display:flex;align-items:center;gap:8px}.rline{flex:1;height:1px;background:var(--line);margin:0 6px}
.rdot{width:26px;height:26px;border-radius:50%;background:var(--raised);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;color:var(--ink60)}
.rstep.on .rdot{background:var(--ember);color:#fff;border-color:var(--ember)}
.rstep.done .rdot{background:var(--ember);color:#fff;border-color:var(--ember);opacity:.55}
.rlabel{font-size:13px;color:var(--ink60)}.rstep.on .rlabel{color:var(--ink);font-weight:600}
/* step */
.eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--ember);margin-bottom:8px}
h1{font-family:var(--serif);font-size:34px;font-weight:400;line-height:1.25}
.lede{color:var(--ink60);margin-top:8px;font-size:14px;max-width:640px}
.imported{display:flex;align-items:center;gap:14px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:22px}
.imported .ck{width:34px;height:34px;border-radius:50%;background:var(--success);color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.imported .it b{font-size:15px}.imported .it div{font-size:12.5px;color:var(--ink60)}
.imported .re{margin-left:auto;color:var(--ember);font-size:12.5px;cursor:pointer;font-weight:600}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink40);margin:24px 0 10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:16px}
.stat .n{font-family:var(--serif);font-size:26px}.stat .l{font-size:12px;color:var(--ink60);margin-top:2px}
textarea,input.ti{width:100%;border:1px solid var(--line);background:var(--raised);border-radius:8px;padding:11px 13px;font-size:13.5px;font-family:var(--sans);resize:vertical}
textarea:focus,input.ti:focus{outline:none;border-color:var(--ember)}
.banner{background:var(--muted);border-radius:8px;padding:12px 14px;font-size:13px;margin:22px 0 14px}.banner b{color:var(--success)}
/* candidate card */
.cand{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer}
.cand:hover{border-color:var(--ember)}
.cand .ic{width:40px;height:40px;border-radius:8px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;flex:none;color:var(--ink60)}
.cand .cn{font-family:var(--serif);font-size:17px;display:flex;align-items:center;gap:8px}
.cand .cd{font-size:12.5px;color:var(--ink60);margin-top:2px}
.cand .from{margin-left:auto;font-size:12px;color:var(--ink40);font-family:var(--mono);flex:none}
/* 导入:两张大选项卡 */
.impgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:26px}
@media(max-width:760px){.impgrid{grid-template-columns:1fr}}
.impcard{background:var(--raised);border:1px solid var(--line);border-radius:16px;padding:26px 26px 22px;display:flex;flex-direction:column;min-height:210px;transition:border-color .2s,box-shadow .2s}
.impcard:hover{border-color:var(--ember);box-shadow:0 4px 18px rgba(167,55,24,.06)}
.impcard .ich{font-size:30px;line-height:1}
.impcard .ity{font-size:21px;margin-top:14px;color:var(--ink)}
.impcard .idesc{font-size:14px;color:var(--ink60);margin-top:9px;line-height:1.6;flex:1}
.impcard .btn{margin:16px 0 0;align-self:flex-start}
.impcard .ibadge{font-size:11.5px;color:var(--ink40);margin-top:12px;font-family:var(--mono)}
.impcard.reco{border-color:#d9b48a}
.impcard .tag{display:inline-block;font-size:11px;color:var(--ember);background:rgba(167,55,24,.08);border-radius:20px;padding:2px 10px;margin-left:8px;vertical-align:middle}
/* 导入引导(选哪个文件夹)*/
.guide{background:var(--muted);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-top:22px;max-width:680px}
.guide ol{margin:10px 0 0;padding-left:20px}.guide li{font-size:14px;color:var(--ink80);margin:7px 0;line-height:1.6}
.pathchip{display:inline-flex;align-items:center;gap:8px;background:var(--raised);border:1px solid var(--line);border-radius:8px;padding:4px 6px 4px 12px;font-family:var(--mono);font-size:13px;color:var(--ember);margin:0 2px}
.pathchip button{font-size:11px;border:0;background:var(--ember);color:#fff;border-radius:6px;padding:4px 9px;cursor:pointer;font-family:var(--sans)}
/* 萃取结果:Personal Context + 三列能力卡 */
.pctx{background:var(--raised);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin:6px 0 20px}
.pctx-h{font-family:var(--serif);font-size:17px;color:var(--ink);margin-bottom:14px}.pctx-h span{font-size:12px;color:var(--ink40);font-family:var(--sans);margin-left:8px;font-weight:400}
.pctx-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:22px}
@media(max-width:760px){.pctx-grid{grid-template-columns:1fr}}
.pctx .pl{font-size:11.5px;color:var(--ink40);text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px;font-family:var(--mono)}
.pctx .ptag{display:inline-block;font-size:13px;background:var(--muted);border:1px solid var(--line);border-radius:7px;padding:4px 10px;margin:0 6px 6px 0;color:var(--ink80)}
.pctx .pstat{font-size:14px;color:var(--ink80);line-height:1.9}.pctx .pstat b{color:var(--ink);font-family:var(--mono)}
.candgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px}
@media(max-width:980px){.candgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.candgrid{grid-template-columns:1fr}}
.candg{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s}
.candg:hover{border-color:var(--ember)}
.candg .ch{display:flex;align-items:center;gap:10px}
.candg .cic{width:34px;height:34px;border-radius:8px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;flex:none;color:var(--ink60)}
.candg .cnm{font-family:var(--serif);font-size:16px;line-height:1.25;color:var(--ink)}
.candg .cdesc{font-size:12.5px;color:var(--ink60);line-height:1.55;flex:1}
.candg .cfoot{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px}
.candg .cfrom{margin-left:auto;font-family:var(--mono);color:var(--ink40)}
.badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:5px}
.b-hi{background:rgba(14,109,82,.12);color:var(--success)}.b-mid{background:rgba(184,137,58,.15);color:var(--gold)}.b-ty{background:var(--muted);color:var(--ink60)}
/* select radio */
.radio{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:13px;margin-bottom:10px;cursor:pointer}
.radio .rc{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center}
.radio.on{border-color:var(--ember);background:var(--ember-soft)}
.radio.on .rc{background:var(--ember);border-color:var(--ember);color:#fff}
.radio .rn{font-family:var(--serif);font-size:16px}.radio .rd{font-size:12px;color:var(--ink60)}
.radio .sel{margin-left:auto;background:var(--ember);color:#fff;font-size:11px;border-radius:5px;padding:3px 9px}
/* structured draft */
.draftcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:22px;margin-top:20px}
.grid2{display:grid;grid-template-columns:1fr 1.4fr;gap:16px}
.fld{margin-bottom:16px}.fld .fl{font-size:13px;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.fld .ft{font-family:var(--mono);font-size:9.5px;background:var(--muted);color:var(--ink40);padding:2px 6px;border-radius:4px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--raised);border-radius:999px;padding:5px 11px;font-size:12.5px}
.chip .x{color:var(--ink40);cursor:pointer}.chip.add{color:var(--ember);border-style:dashed;cursor:pointer;font-weight:600}
.qrow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--raised);border-radius:8px;padding:9px 12px;margin-bottom:8px}
.qrow .qi{font-family:var(--mono);font-size:11px;color:var(--ember);flex:none}
.qrow input{border:none;background:none;flex:1;font-size:13px;font-family:var(--sans)}.qrow input:focus{outline:none}
.addq{color:var(--ember);font-size:12.5px;cursor:pointer;font-weight:600;margin-top:4px;display:inline-block}
/* step5 */
.pub{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-top:20px}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.pcap{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pcap .pic{width:40px;height:40px;border-radius:8px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px}
.pcap .pn{font-family:var(--serif);font-size:17px}.pcap .pt{font-size:11px;color:var(--ink60)}
.eval b{color:var(--success)}.echk{font-size:12.5px;color:var(--ink80);padding:3px 0;display:flex;gap:8px}.echk .y{color:var(--success)}
.share input{font-family:var(--mono);font-size:12px;width:calc(100% - 56px)}
.scope{display:flex;gap:8px;margin-top:10px}.scope button{flex:1;padding:8px;border:1px solid var(--line);background:var(--raised);border-radius:8px;cursor:pointer;font-size:12.5px}
.scope button.on{border-color:var(--ember);color:var(--ember);background:var(--ember-soft)}
.scope button .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ember);margin-right:5px}
.publishbtn{width:100%;background:var(--ember);color:#fff;border:none;border-radius:8px;padding:13px;font-weight:700;font-size:14px;cursor:pointer}
/* browser frame preview */
.browser{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--raised)}
.bbar{background:var(--muted);padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.bbar .dot{width:9px;height:9px;border-radius:50%}.bbar .u{margin-left:8px;font-family:var(--mono);font-size:11px;color:var(--ink60);background:var(--raised);border-radius:5px;padding:3px 10px}
.bbody{padding:18px}
/* buttons / footer */
.foot{display:flex;align-items:center;margin-top:26px}.foot .fl2{color:var(--ink40);font-size:12.5px}
.btn{margin-left:auto;background:var(--ember);color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:13.5px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.4;cursor:wait}.btn.ghost{background:var(--muted);color:var(--ink)}
.spin{color:var(--ember);font-size:13px;display:flex;gap:8px;align-items:center}
.dots{display:inline-flex;gap:3px}.dots i{width:5px;height:5px;border-radius:50%;background:var(--ember);animation:b 1s infinite}.dots i:nth-child(2){animation-delay:.15s}.dots i:nth-child(3){animation-delay:.3s}
@keyframes b{0%,100%{opacity:.25}50%{opacity:1}}
/* 导入加载态(分阶段清单)*/
.ldr{background:var(--raised);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-top:22px;max-width:470px;animation:ldrin .3s ease}
@keyframes ldrin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ldr-t{font-family:var(--serif);font-size:17px;color:var(--ink);margin-bottom:16px}
.ldr .ph{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px;color:var(--ink40);transition:color .3s}
.ldr .ph .phi{width:18px;text-align:center;font-style:normal;font-size:13px}
.ldr .ph.active{color:var(--ink)}
.ldr .ph.done{color:var(--ink60)}
.ldr .ph.active .phi{color:var(--ember);display:inline-block;animation:spin 1s linear infinite}
.ldr .ph.done .phi{color:var(--ember)}
@keyframes spin{to{transform:rotate(360deg)}}
.ldr-src{display:flex;gap:16px;margin:15px 0 9px;min-height:18px}
.ldr-src .chip{font-size:12.5px;display:inline-flex;align-items:center;gap:6px;opacity:.3;transition:opacity .35s}
.ldr-src .chip.on{opacity:1}
.ldr-src .chip::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block}
.ldr-src .chip.claude{color:#C96442}.ldr-src .chip.codex{color:#10a37f}
.ldr-bar{height:6px;border-radius:4px;background:var(--muted);overflow:hidden;position:relative}
.ldr-bar i{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--ember);border-radius:4px;transition:width .3s ease}
.ldr-bar.indet i{width:35%;animation:slide 1.2s ease-in-out infinite}
@keyframes slide{0%{left:-35%}100%{left:100%}}
.ldr-cnt{font-family:var(--mono,monospace);font-size:12px;color:var(--ink60);margin-top:8px}
.ldr-priv{font-size:11.5px;color:var(--ink40);margin-top:15px}
.ldr.err{border-color:var(--ember)}.ldr.err .ldr-t{color:var(--ember)}
.art{white-space:pre-wrap;font-size:13px;line-height:1.7}
.cfield{margin-bottom:12px}.cfield label{display:block;font-size:12.5px;color:var(--ink60);margin-bottom:5px}
.err{color:var(--ember);font-size:12.5px;margin-top:8px}
.hidden{display:none!important}
</style></head>
<body>
<div id="root"></div>
<script>
const $=s=>document.querySelector(s);
// 客户端超时:fetch 本身不会超时,后端若重启/卡住,await 会无限挂起 → 前端永远转圈。
// 用 AbortController 兜底,超时/网络错返回 {error},让各步落到"重试"态而不是干等。
const api=async(p,b,timeoutMs=70000)=>{
  const ctl=new AbortController(); const timer=setTimeout(()=>ctl.abort(),timeoutMs);
  try{
    const r=await fetch(p,{signal:ctl.signal,...(b?{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}:{})});
    const ct=r.headers.get("content-type")||"";
    if(!ct.includes("application/json")){   // 网关 HTML(502/503 重启中)/ 非 JSON → 给可读错误,不抛 "<!DOCTYPE"
      const t=await r.text().catch(()=>"");
      const restarting=r.status===502||r.status===503||r.status===504||/<!doctype|<html/i.test(t);
      return {error: restarting?"服务暂时不可用(可能正在重启)——等几秒点重试":"服务器返回异常("+r.status+")——点重试", _clientFail:true, _status:r.status};
    }
    return await r.json();
  }catch(e){
    return {error: e.name==="AbortError" ? "前端等待超时("+Math.round(timeoutMs/1000)+"s 没等到后端,后端可能重启了)——点重试" : "网络错误:"+(e.message||e), _clientFail:true};
  }finally{clearTimeout(timer);}
};
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const token=new URLSearchParams(location.search).get("token");
const S={step:1,id:null,candidates:[],selected:0,draft:null,manifest:null,evalRes:null,pub:null,scope:"market"};

/* ===================== 消费侧 ===================== */
async function consumer(){
  const a=await api("/api/app?token="+encodeURIComponent(token));
  document.body.style.background="var(--neutral)";
  if(a.error){$("#root").innerHTML='<div class="wrap"><h1 class="serif">找不到这个应用</h1></div>';return}
  $("#root").innerHTML=`<div class="top"><span class="wm serif">Agora</span></div><div class="wrap" style="max-width:720px">${miniAppGUI(a,token)}</div>`;
  wireMini(a,{token});
}
function miniAppGUI(a){
  return `<div class="eyebrow">Agora · Mini App</div><h1 class="serif">${esc(a.title)}</h1><div class="lede">${esc(a.tagline||a.role||"")}</div>
   <div class="pcard" style="margin-top:22px"><div style="font-size:13px;font-weight:600;margin-bottom:12px">填几个，它来帮你</div>
     <div id="cform">${(a.questions||[]).map((q,i)=>`<div class="cfield"><label>${esc(q)}</label><input class="ti" data-k="${esc(a.required_context[i]||('q'+i))}" placeholder="你的回答"></div>`).join("")}</div>
     <button class="publishbtn" id="crun">生成产物</button><div id="cout"></div></div>`;
}
function wireMini(a,ctx){
  $("#crun").onclick=async()=>{const b=$("#crun");b.disabled=true;b.textContent="Pi 跑中…";
    const ans={};document.querySelectorAll('#cform input').forEach(i=>ans[i.dataset.k]=i.value);
    const r=await api("/api/run",{...ctx,answers:ans},90000);b.disabled=false;b.textContent="再生成一份";
    $("#cout").innerHTML=r.error?`<div class="err">${esc(r.error)}</div>`:`<div class="pcard" style="margin-top:14px"><div class="eyebrow">${esc((a.tags||[]).join(" · "))||"产物"}</div><div class="art">${esc(r.artifact)}</div></div>`;};
}

/* ===================== 创作者 5 步 ===================== */
function shell(inner){
  const steps=["导入","提取","选择","结构化","发布"];
  return `<div class="top"><span class="wm serif">Agora</span><span class="sep">/</span><span class="cb">Creator Builder</span>
    <div class="right"><button class="save">保存草稿</button><div class="av">林</div></div></div>
   <div class="wrap"><div class="rail">${steps.map((s,i)=>{const n=i+1;const cls=S.step>n?"done":S.step===n?"on":"";return `<div class="rstep ${cls}"><div class="rdot">${S.step>n?"✓":n}</div><div class="rlabel">${s}</div></div>${i<4?'<div class="rline"></div>':""}`}).join("")}</div>
   <div id="step">${inner}</div></div>`;
}
function render(){({1:step1,2:step2,3:step3,4:step4,5:step5})[S.step]();}

// 客户端解析器由服务器注入(parse-sessions.mjs 唯一真源):parseSession/parseClaude/parseCodex 等。
/*__PARSERS__*/
// 薄封装:文件的 lastModified(数字)→ {date} 给共享 parseSession
function parseSessionFile(txt,fname,lastModified){return parseSession(txt,fname,{date:new Date(lastModified).toISOString().slice(0,10)});}
// ── 浏览器内一键授权读取(File System Access API · Chromium)──
// 用户授权一次「用户主目录」→ 我们直接定位 ~/.claude/projects 与 ~/.codex/sessions 两个子目录读取
// (不遍历整个 home,只读这两处)。句柄存 IndexedDB,复访权限仍在则零点击自动导入。
function fsIdb(){return new Promise((res,rej)=>{const r=indexedDB.open("agora-fs",1);r.onupgradeneeded=()=>r.result.createObjectStore("h");r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function fsIdbSet(k,v){const db=await fsIdb();return new Promise((res,rej)=>{const t=db.transaction("h","readwrite");t.objectStore("h").put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}
async function fsIdbGet(k){const db=await fsIdb();return new Promise((res,rej)=>{const t=db.transaction("h","readonly");const q=t.objectStore("h").get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error)})}
// 存"已授权过的来源文件夹"句柄数组(可能是 .claude/projects、.codex/sessions 等),复访逐个重读
async function fsGetHandles(){const a=await fsIdbGet("dirs").catch(()=>null);return Array.isArray(a)?a:[]}
async function fsAddHandle(h){try{const a=await fsGetHandles();if(!a.some(x=>x&&x.name===h.name))a.push(h);await fsIdbSet("dirs",a.slice(-5))}catch{}}
async function fsPerm(handle,ask){const o={mode:"read"};try{if((await handle.queryPermission(o))==="granted")return true;if(ask&&(await handle.requestPermission(o))==="granted")return true}catch{}return false}
async function fsGetDeep(h,...names){let d=h;for(const n of names){try{d=await d.getDirectoryHandle(n)}catch{return null}}return d}
async function fsWalk(dir,depth,prefix,onFile){if(depth<0)return;for await(const [name,handle] of dir.entries()){const p=prefix?prefix+"/"+name:name;if(handle.kind==="directory"){await fsWalk(handle,depth-1,p,onFile)}else if(name.endsWith(".jsonl")){await onFile(name,handle,p)}}}
async function fsCollectHome(home,onProg){
  const roots=[];for(const [a,b,pfx] of [[".claude","projects",".claude/projects"],[".codex","sessions",".codex/sessions"]]){const d=await fsGetDeep(home,a,b);if(d)roots.push([d,pfx])}
  const fb=!roots.length;if(fb)roots.push([home,""]);const dep=fb?4:6;
  let total=0;for(const [d,pfx] of roots)await fsWalk(d,dep,pfx,async()=>{total++});           // 先只枚举计数(不读内容,快)→ 真实进度条
  const out=[];let done=0;const src={claude:0,codex:0};
  for(const [d,pfx] of roots)await fsWalk(d,dep,pfx,async(name,handle,p)=>{done++;
    try{const f=await handle.getFile();const txt=await f.text();const s=parseSessionFile(txt,p,f.lastModified);if(s){out.push(s);src[s.source]=(src[s.source]||0)+1}}catch{}
    if(onProg)onProg({done,total,parsed:out.length,sources:src});});
  if(onProg)onProg({done,total,parsed:out.length,sources:src});return out;
}
// 分阶段加载态(方案 A):授权→扫描→解析→上传,来源 chip + 进度条 + 隐私提示
function importLoader(phaseDefs){
  const host=$("#imp");if(!host)return null;
  host.innerHTML=`<div class="ldr">
    <div class="ldr-t">正在导入你的对话历史</div>
    <div class="ldr-ph">${phaseDefs.map(p=>`<div class="ph" data-k="${p.k}"><i class="phi">○</i><span>${p.label}</span></div>`).join("")}</div>
    <div class="ldr-src"><span class="chip claude" data-s="claude">Claude <b>0</b></span><span class="chip codex" data-s="codex">Codex <b>0</b></span></div>
    <div class="ldr-bar indet"><i></i></div>
    <div class="ldr-cnt">准备中…</div>
    <div class="ldr-priv">🔒 解析在你浏览器本地完成 · 原始日志不出本机</div></div>`;
  const q=(s)=>host.querySelector(s);
  const setPh=(k,st)=>{const el=host.querySelector(`.ph[data-k="${k}"]`);if(!el)return;el.classList.remove("active","done");if(st)el.classList.add(st);el.querySelector(".phi").textContent=st==="done"?"✓":st==="active"?"⟳":"○"};
  return {
    enter(k){let passed=false;for(const p of phaseDefs){if(p.k===k){setPh(k,"active");passed=true}else if(!passed)setPh(p.k,"done")}},
    sources(s){const c=q('.chip[data-s="claude"]'),x=q('.chip[data-s="codex"]');if((s.claude||0)>0){c.classList.add("on");c.querySelector("b").textContent=s.claude}if((s.codex||0)>0){x.classList.add("on");x.querySelector("b").textContent=s.codex}},
    progress(done,total){const bar=q(".ldr-bar"),fill=q(".ldr-bar i");if(total>0){bar.classList.remove("indet");fill.style.width=Math.min(100,Math.round(done/total*100))+"%";q(".ldr-cnt").textContent=`解析 ${done}/${total} 个文件`}},
    note(t){q(".ldr-cnt").textContent=t},
    indet(t){const bar=q(".ldr-bar");if(bar)bar.classList.add("indet");if(t)q(".ldr-cnt").textContent=t},
    fail(msg){const card=q(".ldr");if(card)card.classList.add("err");const t=q(".ldr-t");if(t)t.textContent="导入出了点问题";const b=q(".ldr-bar");if(b){b.classList.remove("indet");b.querySelector("i").style.width="100%"}q(".ldr-cnt").textContent=msg;
      if(card&&!card.querySelector(".ldr-retry"))card.insertAdjacentHTML("beforeend",`<div style="margin-top:14px"><button class="btn ghost ldr-retry">↻ 重新开始</button></div>`);const rb=card&&card.querySelector(".ldr-retry");if(rb)rb.onclick=()=>step1();}
  };
}

// 萃取加载态(慢 LLM 多阶段):精读→归纳→多轮校验→排序,带已用时计时器 + 实时状态
function extractLoader(){

    <div class="ldr-ph" style="margin-top:14px">${PH.map(p=>`<div class="ph" data-k="${p.k}"><i class="phi">○</i><span>${p.label}</span></div>`).join("")}</div>
    <div class="ldr-bar indet" style="margin-top:14px"><i></i></div>

  const q=(s)=>host.querySelector(s);
  const setPh=(k,st)=>{const el=host.querySelector(`.ph[data-k="${k}"]`);if(!el)return;el.classList.remove("active","done");if(st)el.classList.add(st);el.querySelector(".phi").textContent=st==="done"?"✓":st==="active"?"⟳":"○"};
  const t0=Date.now();
  const tick=setInterval(()=>{const el=q("#x-el");if(el)el.textContent="已用 "+Math.round((Date.now()-t0)/1000)+"s"; else clearInterval(tick);},1000);
  return {
    enter(k){let passed=false;for(const p of PH){if(p.k===k){setPh(k,"active");passed=true}else if(!passed)setPh(p.k,"done")}},
    progress(done,total){const bar=q(".ldr-bar"),fill=q(".ldr-bar i");if(total>0){bar.classList.remove("indet");fill.style.width=Math.min(100,Math.round(done/total*100))+"%";const s=q("#x-stat");if(s)s.textContent=`精读 ${done}/${total} 段`}},
    stat(t){const s=q("#x-stat");if(s)s.textContent=t},
    indet(){const bar=q(".ldr-bar");if(bar)bar.classList.add("indet")},
    stop(){clearInterval(tick)},
    fail(msg){clearInterval(tick);const c=q(".ldr");if(c)c.classList.add("err");const t=q(".ldr-t");if(t)t.textContent="萃取出了点问题";const b=q(".ldr-bar");if(b){b.classList.remove("indet");b.querySelector("i").style.width="100%"}const s=q("#x-stat");if(s)s.textContent=msg;
      if(c&&!c.querySelector(".ldr-retry"))c.insertAdjacentHTML("beforeend",`<div style="margin-top:14px"><button class="btn ghost ldr-retry">↻ 重试</button></div>`);const rb=c&&c.querySelector(".ldr-retry");if(rb)rb.onclick=()=>step2load();}
  };
}
function step1(){
  const HOSTED=!/^(localhost|127(\.|$)|0\.0\.0\.0|\[?::1|::1)$/.test(location.hostname);
  const FS_OK=!!window.showDirectoryPicker;
  // 主卡 = 能拿"全部、不漏"的方式;副卡 = 快但可能不全。本机直扫/CURL 才是程序化全量,FS 手选只读你指的那个文件夹。
  const cardCurl=`<div class="impcard reco">
       <div class="ich">🖥</div>
       <div class="ity serif">连接本机 · 导入全部<span class="tag">推荐 · 最全</span></div>
       <div class="idesc">复制一行命令到终端运行,自动扫描你本机<b>全部</b> Claude / Codex / opencode 历史并上传。<b>一个文件夹都不用选,也不会漏</b>。</div>
       <button class="btn" id="bconnect">生成命令 →</button>
       <div class="ibadge">程序化全量扫描 · 零选择 · 需本机已装 Node</div></div>`;

       <div class="ich">⚡</div>
       <div class="ity serif">一键导入(本机直读)<span class="tag">推荐 · 最全</span></div>
       <div class="idesc">直接扫描这台机器上的 <b>全部</b> ~/.claude、~/.codex、opencode —— 全自动,无需选文件夹,不会漏。</div>
       <button class="btn" id="bimport">开始导入 →</button>
       <div class="ibadge">程序化全量扫描 · 无需选文件夹</div></div>`;
  const cardFS=`<div class="impcard">
       <div class="ich">⚡</div>
       <div class="ity serif">浏览器内快速导入</div>
       <div class="idesc">${FS_OK?'在浏览器里授权一个文件夹快速读取。<b>注意:只读你授权的那一个目录</b>(比如只 Claude),其它来源会漏 —— 想要全的用左边「连接本机」。':'你的浏览器不支持一键(建议 Chrome / Edge),请用左边「连接本机」。'}</div>
       <button class="btn ghost" id="bimport">开始 →</button>
       <div class="ibadge">快,但只覆盖你选的那个文件夹</div></div>`;
  const grid=!HOSTED?(cardScan+`<div class="impcard">
       <div class="ich">🖥</div><div class="ity serif">通过 CURL 命令导入</div>
       <div class="idesc">换台机器、或想要可复制的命令:粘一行到终端即可。同样全量、零选择。</div>
       <button class="btn ghost" id="bconnect">生成命令 →</button><div class="ibadge">全量 · 零选择 · 需 Node</div></div>`):(cardCurl+cardFS);
  $("#root").innerHTML=shell(`<div class="eyebrow">STEP 1 · 导入</div><h1 class="serif">导入你的对话历史</h1>
   <div class="lede">把你真实的 AI 对话历史(Claude Code / Codex / opencode)导进来,Agora 从中萃取你反复在做的能力。整个过程仅你可见。</div>
   <div id="imp">
     <div class="impgrid">${grid}</div>
     <div id="imphint" class="fl2" style="margin-top:16px;font-size:12.5px;max-width:760px;line-height:1.7"></div>
   </div>`);
  const PICK_MSG='选你本机的 <b>~/.claude/projects</b>(Claude Code)或 <b>~/.codex/sessions</b>(Codex)文件夹 —— Finder 里 <b>⌘⇧G</b> 粘路径直达。两种格式自动识别;导入完一个会提示「➕ 再导入另一个」。';
  const PHASES_FS=[{k:'auth',label:'授权读取'},{k:'scan',label:'扫描 ~/.claude · ~/.codex'},{k:'parse',label:'解析会话'},{k:'upload',label:'上传'}];
  const bimport=$("#bimport"),bconnect=$("#bconnect");
  const isMac=/Mac|iPhone|iPad/i.test(navigator.platform||navigator.userAgent);

  // 选文件夹(动态 input,不依赖常驻 DOM)→ 解析 → 上传,全程走加载态
  const openPicker=(msg)=>{const hint=$("#imphint");if(hint&&msg)hint.innerHTML=msg;const inp=document.createElement("input");inp.type="file";inp.webkitdirectory=true;inp.multiple=true;inp.style.display="none";inp.onchange=(e)=>handleDirFiles([...e.target.files]);document.body.appendChild(inp);inp.click();setTimeout(()=>inp.remove(),1000);};
  async function handleDirFiles(all){
    const files=all.filter(f=>f.name.endsWith(".jsonl"));
    if(!files.length){const h=$("#imphint");if(h)h.textContent="没找到 .jsonl —— 请选含 .jsonl 的文件夹(如 ~/.claude/projects)。";return}
    const L=importLoader([{k:'scan',label:'读取所选文件夹'},{k:'parse',label:'解析会话'},{k:'upload',label:'上传'}]);
    L.enter('parse');const sessions=[];let done=0;const src={claude:0,codex:0};
    for(const f of files){try{const txt=await f.text();const s=parseSessionFile(txt,f.webkitRelativePath||f.name,f.lastModified);if(s){sessions.push(s);src[s.source]=(src[s.source]||0)+1}}catch{}
      done++;if(done%10===0||done===files.length){L.progress(done,files.length);L.sources(src)}}
    await uploadSessions(sessions,L);
  }

  // 上传 + 渲染 + 智能「再导一个来源」提示(FS 路一次拿全两源,通常不出现)
  async function uploadSessions(sessions,L){
    if(!sessions.length){if(L)L.fail("没解析到会话 —— 确认选的是含历史的目录,或点「重新开始」换个方式。");return}
    if(L)L.enter('upload');
    const r=await api("/api/import-uploaded",S.id?{sessions,appendTo:S.id}:{sessions});
    if(r.error){if(L)L.fail("上传失败:"+r.error);return}
    S.id=r.id;showImported(r.stats,r.sessions,"已导入(共 "+r.stats.segments+" 段)");   // 替换 #imp,加载态自然消失
    const bs=r.stats.by_source||{};const hasC=bs.claude>0,hasX=bs.codex>0;
    if(!(hasC&&hasX)){const miss=!hasX?"Codex(~/.codex/sessions)":"Claude(~/.claude/projects)";
      setTimeout(()=>{const im=$("#imp");if(im&&!$("#addsrc"))im.insertAdjacentHTML("beforeend",`<div style="margin-top:10px"><button class="btn ghost" id="addsrc">➕ 再导入 ${miss}</button><span class="fl2" style="font-size:12px;margin-left:10px">建议两边都导入,萃取更全</span></div>`);const a=$("#addsrc");if(a)a.onclick=()=>(window.showDirectoryPicker?fsImport(true):openPicker(PICK_MSG));},50);}
  }
  // 连接本机(零选择):铸配对码 → 显示一行命令 → 轮询本机助手上传 → 自动进下一步
  async function connectFlow(){
    const r=await api("/api/connect/new",{});
    if(r.error){const h=$("#imphint");if(h)h.textContent="生成配对码失败:"+r.error;return}
    const code=r.code,cmd=`curl -fsSL ${location.origin}/connect.mjs | node - ${code}`;
    const host=$("#imp");
    host.innerHTML=`<div class="ldr"><div class="ldr-t">连接本机 · 零选择导入</div>
      <div style="font-size:13px;color:var(--ink60);margin-bottom:12px;line-height:1.6">在你电脑的<b>终端</b>粘这一行回车 —— 它在<b>你本机</b>读取全部 Claude / Codex 历史并上传(需已装 Node;原始日志不出本机)。读完这里自动进下一步。</div>
      <div style="display:flex;gap:8px;align-items:stretch;margin-bottom:4px"><code id="ccmd" style="flex:1;background:var(--muted);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:12px;overflow-x:auto;white-space:nowrap;color:var(--ink)">${cmd}</code><button class="btn" id="ccopy" style="margin:0;flex:none">复制</button></div>
      <div class="ldr-bar indet" style="margin-top:12px"><i></i></div>
      <div class="ldr-cnt" id="cstat">等待本机助手运行…(配对码 <b>${code}</b>)</div>
      <div class="ldr-priv">🔒 助手在你本机运行 · 只上传提取后的文本</div>
      <div style="margin-top:13px"><button class="btn ghost" id="cback">← 返回其它方式</button></div></div>`;
    $("#ccopy").onclick=()=>{navigator.clipboard.writeText(cmd).then(()=>{$("#ccopy").textContent="已复制 ✓";setTimeout(()=>{const b=$("#ccopy");if(b)b.textContent="复制"},1500)})};
    $("#cback").onclick=()=>step1();
    let tries=0,stop=false;
    const poll=async()=>{ if(stop||!document.getElementById("cstat"))return; tries++;
      const p=await api("/api/connect/poll?code="+code);
      if(p&&p.ready){stop=true;S.id=p.id;showImported(p.stats,null,"已从本机导入(共 "+p.stats.segments+" 段)");return}
      if(p&&p.error){const cs=$("#cstat");if(cs)cs.textContent=p.error;return}
      if(tries>450){const cs=$("#cstat");if(cs)cs.textContent="超时了 —— 点「返回」重来,或确认命令已在终端跑完。";return}
      setTimeout(poll,2000);
    };
    poll();
  }
  // 浏览器内授权读取一个来源文件夹(~/.claude/projects 或 ~/.codex/sessions)。Chrome 禁止选主目录(含系统文件),
  // 所以引导用户用 ⌘⇧G 直接定位到具体子目录(子目录不在黑名单)。多源经「➕ 再导入」追加。
  const FS_PICK_TIP='弹框里按 <b>⌘⇧G</b> → 粘贴 <b>~/.claude/projects</b> → 回车 → 「打开」。<br>(导完会提示再导 Codex:同样 ⌘⇧G 粘 <b>~/.codex/sessions</b>)';
  async function fsImport(gesture){
    if(!gesture)return;
    let L=null;
    try{
      L=importLoader(PHASES_FS);
      L.enter('auth');L.indet("授权一个历史文件夹 —— "+FS_PICK_TIP);
      let dir;
      try{ dir=await window.showDirectoryPicker({id:"agora",mode:"read"}); }
      catch(e){ if(e&&e.name==="AbortError"){L.fail("已取消(或选到了被保护的文件夹)。<br>请点「重新开始」,这次用 <b>⌘⇧G</b> 直接粘 <b>~/.claude/projects</b> —— <b>别选整个主目录</b>(Chrome 不允许)。");return} throw e; }
      if(!(await fsPerm(dir,true))){L.fail("未授权。点「重新开始」再来。");return}
      await fsAddHandle(dir);
      L.enter('scan');L.indet("读取所选文件夹…");
      let first=true;
      const sessions=await fsCollectHome(dir,(p)=>{if(first){L.enter('parse');first=false}L.progress(p.done,p.total);L.sources(p.sources)});
      if(!sessions.length){L.fail("这个文件夹里没找到会话(.jsonl)。<br>确认选的是 <b>~/.claude/projects</b> 或 <b>~/.codex/sessions</b>(⌘⇧G 直接定位最稳)。");return}
      await uploadSessions(sessions,L);

      const m=(e&&e.name==="AbortError")?"已取消。点「重新开始」再来。":("出错:"+(e?.message||e));

  // 复访:重读已授权过的文件夹句柄,合并上传。每条路径都有出口(成功 / 失败带重试),绝不冻结。
  async function fsRevisit(){
    let L=null;
    try{
      const dirs=await fsGetHandles();
      const granted=[];for(const h of dirs){try{if((await h.queryPermission({mode:"read"}))==="granted")granted.push(h)}catch{}}
      if(!granted.length){step1();const t=$("#imphint");if(t)t.innerHTML="上次的授权需要重新确认 —— 点「⚡ 一键导入」再授权一次。";return}
      L=importLoader(PHASES_FS);L.enter('scan');L.indet("读取上次授权的文件夹…");
      let all=[];let first=true;
      for(const h of granted){const s=await fsCollectHome(h,(p)=>{if(first){L.enter('parse');first=false}L.sources(p.sources)});all=all.concat(s)}
      if(!all.length){L.fail("上次授权的文件夹里没读到会话(可能被移动/清空)。点「重新开始」重新选文件夹。");return}
      await uploadSessions(all,L);
    }catch(e){ const m="读取出错:"+(e&&e.name==="NotAllowedError"?"授权已失效":(e?.message||e))+"。点「重新开始」再来。"; if(L)L.fail(m); else{step1();const t=$("#imphint");if(t)t.textContent=m;} }
  }

  // 卡 A「一键导入」引导页:明确告诉用户按哪个键、粘哪个路径(解决"不知道选哪个")

// Personal Context:从萃取结果 + 导入统计派生(无额外 LLM),给"这是谁/反复在做什么"留展示位

}

// 萃取很慢(120 段可达 4+ 分钟)。结果经 SSE done 通知 → GET 拉取,不靠这条 HTTP 撑到结束(去掉超时天花板)。
// 结果落盘 → 断线/超时重试都秒回缓存。并发防抖在后端。
async function step2load(){
  step2();
  const L=extractLoader();
  const id=S.id;
  let es=null, pollTimer=null, settled=false;
  const cleanup=()=>{try{es&&es.close()}catch{}; if(pollTimer)clearInterval(pollTimer); if(L)L.stop();};
  const finish=(r)=>{ if(settled)return; settled=true; cleanup(); renderCandidates(r); };
  const fail=(msg)=>{ if(settled)return; settled=true; cleanup(); if(L)L.fail(msg); else $("#o2").innerHTML=`<div class="err">${esc(msg)}</div>`; };
  // 会话状态没了(服务重启过 / app 不存在)→ 快速回第一步重新导入,别傻等
  const failGone=()=>{ if(settled)return; settled=true; cleanup(); if(L){L.fail("会话状态丢失了(服务可能重启过)。点下面回第一步重新导入。");const rb=document.querySelector("#o2 .ldr-retry");if(rb){rb.textContent="← 回第一步重新导入";rb.onclick=()=>{S.id=null;S.step=1;render();};}} else {S.id=null;S.step=1;render();} };
  let retriggered=false;
  async function pull(){ if(settled)return; const r=await api("/api/extract/result?id="+encodeURIComponent(id),null,15000);
    if(r&&r.candidates){finish(r);return}
    if(r&&r.error==="no app"){failGone();return}
    if(r&&r.error==="not extracted"&&!retriggered){ retriggered=true; if(L)L.stat("萃取像是被中断了,正在重新开始…"); api("/api/extract",{id},30000); }  // app 在但没在跑也没结果(被重启打断)→ 自愈重触发一次
  }
  try{
    es=new EventSource("/api/extract/progress?id="+encodeURIComponent(id));
    await new Promise((r)=>{es.onopen=r;es.onerror=r;setTimeout(r,600);});   // 订阅就绪再发起,避免错过 done
    es.addEventListener("phase",(e)=>{const d=JSON.parse(e.data);if(!L)return;L.enter(d.k);if(d.k==="read")L.stat("精读会话中…");else{L.indet();L.stat(d.k==="taxonomy"?"归纳能力图谱…":d.k==="verify"?"多轮校验中…":"排序产出…");}});
    es.addEventListener("progress",(e)=>{const d=JSON.parse(e.data);if(L&&d.phase==="read")L.progress(d.done,d.total);});
    es.addEventListener("taxonomy",(e)=>{const d=JSON.parse(e.data);if(L){L.indet();L.stat("归纳出 "+d.count+" 类能力,开始校验…");}});
    es.addEventListener("round",(e)=>{const d=JSON.parse(e.data);if(L){L.indet();L.stat("多轮校验 第 "+d.k+"/"+d.total+" 轮(稳定性)…");}});
    es.addEventListener("done",()=>{pull();});
    es.addEventListener("error",(e)=>{ if(!e||!e.data)return; let m="萃取失败,请重试"; try{m=JSON.parse(e.data).msg||m}catch{} fail(m); });  // 有 data 才是后端错误;无 data 是连接抖动(会自动重连)→忽略
  }catch{}
  // 触发(短超时;只等 {started} / 缓存 / 粘贴态降级直接拿到结果)
  const post=await api("/api/extract",{id},30000);
  if(post&&post.candidates){ finish(post); return; }                       // 缓存命中 或 粘贴态降级 → 直接渲染
  if(post&&post.error==="no app"){ failGone(); return; }                   // app 没了(服务重启)→ 回第一步
  if(post&&post.error&&!post.started&&!post._clientFail){ fail(post.error); return; }
  // 兜底轮询:万一 done 错过(SSE 断/窗口),每 15s 拉一次;6 分钟总上限(已完成会秒回缓存)
  let waited=0;
  pollTimer=setInterval(async()=>{ if(settled)return; waited+=15; await pull(); if(!settled&&waited>=360){ clearInterval(pollTimer); fail("萃取等太久了(>6 分钟)——点重试(已完成会秒回,没完成会重跑)。"); } },15000);
}

    <div class="fld"><div class="fl">输入问题 · 运行时会问用户 <span class="ft">Question[]</span></div><div id="d_qs">${(d.questions||[]).map((q,i)=>qrow(q,i)).join("")}</div><span class="addq" onclick="addQ()">+ 添加问题（建议 4–6 个）</span></div>
    <div class="fld"><div class="fl">输出产物规范</div><input class="ti" id="d_out" value="${esc(d.output_spec||"")}"></div>
    <div class="fld"><div class="fl">标签 <span class="ft">string[]</span></div><div class="chips" id="d_tags">${(d.tags||[]).map(t=>chip(t)).join("")}<span class="chip add" onclick="addChip('d_tags')">+ 添加</span></div></div>
  </div>
  <div class="foot"><span class="fl2">${(d.questions||[]).length} 个问题 · 第 4 步,共 5 步</span><button class="btn" id="b4">下一步:发布与试用 →</button></div>`;
  $("#b4").onclick=saveAndGo5;
}
const chip=t=>`<span class="chip">${esc(t)} <span class="x" onclick="this.parentNode.remove()">×</span></span>`;
const qrow=(q,i)=>`<div class="qrow"><span class="qi">[${i}]</span><input value="${esc(q)}"></div>`;
window.addChip=id=>{const v=prompt("添加");if(v){const add=$("#"+id+" .add");add.insertAdjacentHTML("beforebegin",chip(v));}};
window.addQ=()=>{const n=document.querySelectorAll("#d_qs .qrow").length;$("#d_qs").insertAdjacentHTML("beforeend",qrow("",n));};
async function saveAndGo5(){
  const draft={name:$("#d_name").value,tagline:$("#d_tag").value,output_spec:$("#d_out").value,
    target_users:[...document.querySelectorAll('#d_users .chip:not(.add)')].map(c=>c.textContent.replace("×","").trim()),
    tags:[...document.querySelectorAll('#d_tags .chip:not(.add)')].map(c=>c.textContent.replace("×","").trim()),
    questions:[...document.querySelectorAll('#d_qs .qrow input')].map(i=>i.value).filter(Boolean)};
  // 重新生成 instructions 让槽与问题对齐(简单:保留原 instructions)
  draft.instructions=S.draft.instructions;
  const r=await api("/api/save-draft",{id:S.id,draft});S.manifest=r.manifest;S.draft={...S.draft,...draft};
  S.step=5;render();step5load();
}
function step5(){$("#root").innerHTML=shell(`<div class="eyebrow">STEP 5 · 发布与试用</div><h1 class="serif">发成 mini-app，先在这里完整试用</h1>
   <div class="lede">它本身就带 GUI——右侧是真实可交互的 mini-app,发布前用真实输入跑一遍、确认产物没问题,再一键发布。</div>
   <div id="o5"><div class="spin" style="margin-top:24px">Pi 在做 Auto-Eval(校验 + 试跑一次) <span class="dots"><i></i><i></i><i></i></span></div></div>`);}
function step5error(msg,toStep){$("#o5").innerHTML=`<div class="banner" style="border-color:var(--gold);margin-top:18px"><b>${esc(msg)}</b></div><div class="foot" style="margin-top:14px"><button class="btn" style="margin:0" id="e5retry">重试</button> <button class="btn ghost" id="e5back">${toStep===1?"← 回第一步重新导入":"← 回上一步"}</button></div>`;const r=$("#e5retry");if(r)r.onclick=()=>step5load();const b=$("#e5back");if(b)b.onclick=()=>{if(toStep===1){S.id=null;S.step=1}else{S.step=4};render();};}
async function step5load(){step5();
  if(!S.manifest||!S.manifest.manifest){step5error("还没有结构化规范(可能状态丢失了)。",4);return}   // 防 S.manifest 为空时白屏/卡转圈
  const ev=await api("/api/eval",{id:S.id},90000);S.evalRes=ev;
  if(ev&&ev.error==="no app"){step5error("会话状态丢失了(服务可能重启过)。",1);return}            // app 没了 → 回第一步,别卡转圈
  const app=await api("/api/app?id="+S.id);
  const slug=(S.manifest.manifest.mini_app_id);
  $("#o5").innerHTML=`<div class="pub">
    <div><div class="pcard"><div class="pcap"><div class="pic serif">${esc(S.draft.name[0])}</div><div><div class="pn serif">${esc(S.draft.name)}</div><div class="pt">${esc((S.draft.tags||[])[0]||"Mini App")}</div></div></div>
      <div class="eval"><b>Auto-Eval ✓ 通过</b>${(ev.checks||[]).map(c=>`<div class="echk"><span class="y">✓</span> ${esc(c)}</div>`).join("")}</div></div>
      <div class="pcard share"><div style="font-size:13px;font-weight:600;margin-bottom:8px">分享链接</div>
        <div style="display:flex;gap:8px"><input class="ti" value="agora.app/a/${esc(slug)}" readonly><button class="save" id="copy">复制</button></div>
        <div class="scope"><button class="on" data-s="market"><span class="d"></span>列入市集</button><button data-s="private">仅私享</button></div></div>
      <button class="publishbtn" id="pub">🚀 发布</button>
      <div class="fl2" style="margin-top:10px;font-size:11.5px">发布后进入人工评审(Alpha);试用不计入对外数据。</div></div>
    <div><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:13px;font-weight:600">试用 · 发布前完整体验</div><span style="font-family:var(--mono);font-size:10px;color:var(--success)">● LIVE</span></div>
      <div class="browser"><div class="bbar"><span class="dot" style="background:#e06c5b"></span><span class="dot" style="background:#e0b95b"></span><span class="dot" style="background:#7bb87b"></span><span class="u">agora.app/a/${esc(slug)}</span></div>
        <div class="bbody">${miniAppGUI(app)}</div></div></div></div>`;
  wireMini(app,{id:S.id});
  $("#copy").onclick=()=>navigator.clipboard.writeText("agora.app/a/"+slug);
  document.querySelectorAll('.scope button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.scope button').forEach(x=>x.classList.toggle('on',x===b));S.scope=b.dataset.s;});
  $("#pub").onclick=async()=>{const b=$("#pub");b.disabled=true;b.textContent="发布中…";const r=await api("/api/publish",{id:S.id,scope:S.scope});
    b.textContent="✓ 已发布:agora.app/a/"+r.slug;b.style.background="var(--success)";};
}
token?consumer():(render());
</script>
</body></html>
