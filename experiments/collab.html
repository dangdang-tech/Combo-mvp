<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>协作式 · collaborator</title>
<style>
:root{--ember:#A73718;--ink:#14141A;--line:#E1D8CA;--paper:#FBF8F1;--raised:#fff;--mut:#6b6457}
*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans SC",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6}
.top{border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--paper);z-index:5}
.top a{color:var(--mut);text-decoration:none;font-size:13px}.tag{font-size:11px;font-family:"Geist Mono",monospace;color:var(--ember);border:1px solid var(--ember);border-radius:999px;padding:1px 8px}
/* intake */
.intake{max-width:680px;margin:6vh auto;padding:0 22px}
.intake h1{font-family:"Noto Serif SC",serif;font-size:26px;margin:0 0 6px}.intake .sub{color:var(--mut);margin:0 0 20px}
.intro{background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13.5px;color:var(--mut)}
.intro b{color:var(--ink)}
textarea.intent{width:100%;min-height:96px;resize:vertical;font:inherit;border:1px solid var(--line);border-radius:12px;padding:14px;background:var(--raised)}
.row{display:flex;gap:10px;align-items:center;margin-top:12px}
button{font:inherit;background:var(--ember);color:#fff;border:0;border-radius:10px;padding:9px 20px;cursor:pointer}button.ghost{background:transparent;color:var(--ember);border:1px solid var(--ember)}button:disabled{opacity:.5}
.starters{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.chip{cursor:pointer;font-size:13px;border:1px solid var(--line);background:var(--raised);border-radius:999px;padding:5px 12px}.chip:hover{border-color:var(--ember)}
/* runshell */
.shell{display:none;grid-template-columns:340px 1fr;height:calc(100vh - 51px)}
@media(max-width:820px){.shell{grid-template-columns:1fr;height:auto}}
.thread{border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%;min-height:0}
.tlog{flex:1;overflow:auto;padding:16px}
.evt{font-size:13px;margin:8px 0;color:var(--mut)}.evt .p{color:var(--ink);white-space:pre-wrap}
.evt.run{font-family:"Geist Mono",monospace;font-size:12px;color:var(--ember)}
.chat{border-top:1px solid var(--line);padding:10px;display:flex;gap:8px}
.chat textarea{flex:1;resize:none;font:inherit;border:1px solid var(--line);border-radius:9px;padding:8px;background:var(--raised)}
.chat button{padding:0 14px}
.canvas{overflow:auto;padding:22px}
.cv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cv-head h2{font-family:"Noto Serif SC",serif;font-size:19px;margin:0}
table{border-collapse:collapse;width:100%;background:var(--raised);border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{border:1px solid var(--line);padding:0;vertical-align:top;text-align:left}
th{background:#f1ead9;font-size:13px;padding:9px 12px;font-weight:600}
td .cell{padding:10px 12px;min-height:46px;font-size:13.5px;outline:none}
td .cell[contenteditable]:focus{box-shadow:inset 0 0 0 2px var(--ember)}
td.locked{background:#a737180a}td.locked .cell{color:var(--ink)}
.lockbadge{font-size:10.5px;color:var(--ember);font-family:"Geist Mono",monospace;padding:0 12px 6px}
.cellcites{padding:0 12px 8px;display:flex;flex-wrap:wrap;gap:4px}
.cc{font-size:10px;font-family:"Geist Mono",monospace;border:1px solid var(--line);border-radius:5px;padding:0 5px;color:var(--mut)}
.cc.guardrail{color:var(--ember);border-color:var(--ember)}.cc.taste{color:#7a5b12;border-color:#caa94e}.cc.case{color:#1d6b4f;border-color:#1d6b4f}
.editbar{position:absolute;background:var(--ink);color:#fff;border-radius:9px;padding:6px;display:none;gap:6px;z-index:10;box-shadow:0 6px 24px #0003}
.editbar button{font-size:12px;padding:5px 10px;border-radius:6px}
.editbar .pin{background:#fff;color:var(--ink)}.editbar .cont{background:var(--ember)}
.empty{color:var(--mut);text-align:center;padding:40px}
.statusdim{opacity:.55;transition:.2s}
.hint{font-size:12px;color:var(--mut);margin-top:8px}
</style></head><body>
<div class="top"><a href="/">← 实验台</a><span class="tag">stance = collaborator</span><span id="topmode" style="font-size:13px;color:var(--mut)">协作式 · 意图框 → 可编辑产物 → 有环微调</span></div>

<!-- 第一面:意图框(自由文本,非表单) -->
<div class="intake" id="intake">
  <h1 id="ititle">…</h1><p class="sub">不用填表。一句话告诉我你在纠结什么,我按这个人的判断帮你摆开。</p>
  <div class="intro" id="intro"></div>
  <textarea class="intent" id="intent" placeholder="比如:我手里 A、B 两个 offer,B 多 30% 薪资,但 A 团队更强,帮我对比一下该怎么选"></textarea>
  <div class="row"><button id="go">开始干活</button><span class="hint">过程你看得见,出来的表每一格都能直接改。</span></div>
  <div class="starters" id="starters"></div>
</div>

<!-- 第二面:RunShell -->
<div class="shell" id="shell">
  <div class="thread">
    <div class="tlog" id="tlog"></div>
    <div class="chat"><textarea id="cinp" rows="2" placeholder="对话微调:比如「第三行太严了,按他一贯风格放松点」"></textarea><button id="csend">发</button></div>
  </div>
  <div class="canvas">
    <div class="cv-head"><h2 id="cvtitle">对比矩阵</h2><div><button class="ghost" id="redo">↻ 换个方向</button></div></div>
    <div id="art"><div class="empty">正在按他的判断把矩阵摆出来…</div></div>
    <div class="hint">改某格后会弹出两个选择:<b>就这么定</b>(锁定·它不再覆盖)/ <b>按这个继续</b>(锁定并让它据此把其余格顺一遍)。这就是有环。</div>
  </div>
</div>

<div class="editbar" id="editbar"><button class="pin">就这么定</button><button class="cont">按这个继续</button></div>

<script>
const $=s=>document.querySelector(s);let sid=null,started=false,blocks={},version=0,curArt=null,running=false;
const kindLabel={guardrail:"守则",taste:"品味",case:"案例"};
async function boot(){
  const e=await(await fetch("/api/experience")).json();
  $("#ititle").textContent=`让「${e.ownerName}」帮你拍板`;
  $("#intro").innerHTML=`我会按 <b>${e.ownerName}</b> 在「${e.title}」上的品味和守则替你判断 —— 比如「倦怠一票否决」「三年视角优先于涨薪」。产物里每一格都会标出命中了他的哪条。`;
  e.blocks.forEach(b=>blocks[b.id]={label:b.label,kind:b.kind});
  ["我手里 A、B 两个 offer,B 多 30%,但 A 团队更强,帮我对比该怎么选","想从大厂跳去早期创业,帮我把要权衡的摆开","在『内部转岗』和『直接离职』之间纠结"].forEach(t=>{const c=document.createElement("div");c.className="chip";c.textContent=t;c.onclick=()=>{$("#intent").value=t};$("#starters").appendChild(c)});
  const s=await(await fetch("/api/session",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({stance:"collaborator"})})).json();
  sid=s.sessionId;openSSE();
}
function logEvt(cls,html){const d=document.createElement("div");d.className="evt "+cls;d.innerHTML=html;$("#tlog").appendChild(d);$("#tlog").scrollTop=1e9;return d;}
let progBuf="",progEl=null;
function openSSE(){
  const es=new EventSource("/api/events?sessionId="+sid);
  es.onmessage=ev=>{const d=JSON.parse(ev.data);
    if(d.type==="task.accepted"){running=true;progBuf="";progEl=logEvt("run","● 开始按他的判断干活…");$("#art").classList.add("statusdim");}
    if(d.type==="task.progress"){progBuf+=d.delta||"";if(progEl)progEl.innerHTML='<span class="p">'+esc(stripJson(progBuf))+'</span>';$("#tlog").scrollTop=1e9;}
    if(d.type==="task.output"&&d.text){if(progEl)progEl.innerHTML='<span class="p">'+esc(d.text)+'</span>';}
    if(d.type==="task.completed"&&d.artifact){running=false;version=d.version;curArt=d.artifact;renderArt(d.artifact);$("#art").classList.remove("statusdim");if(d.warnings&&d.warnings.length)logEvt("","⚠ "+d.warnings.join("; "));}
    if(d.type==="task.failed"){running=false;logEvt("","出错:"+d.error);$("#art").classList.remove("statusdim");}
    if(d.type==="task.cancelled"){running=false;logEvt("run","■ 已中断");$("#art").classList.remove("statusdim");}
  };
}
function stripJson(t){return t.replace(/```json[\s\S]*?```/g,"").replace(/```json[\s\S]*$/,"").trim();}
function esc(t){return(t||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))}
function renderArt(a){
  if(!a||!a.rows||!a.rows.length){$("#art").innerHTML='<div class="empty">(空)</div>';return;}
  const cols=a.columns||[];
  let h='<table><thead><tr><th></th>'+cols.map(c=>`<th>${esc(c.label||c.key)}</th>`).join("")+'</tr></thead><tbody>';
  a.rows.forEach(r=>{
    h+=`<tr><th>${esc(r.label||r.key)}</th>`;
    cols.forEach(c=>{
      const cell=r.cells.find(x=>x.colKey===c.key)||{};
      const path=r.key+"/"+c.key;const locked=!!cell.locked;
      const cites=(cell.citedBlockIds||[]).map(id=>blocks[id]?`<span class="cc ${blocks[id].kind}">${blocks[id].label}</span>`:"").join("");
      h+=`<td class="${locked?'locked':''}" data-path="${path}">`+
         `<div class="cell" ${locked?'':'contenteditable'} data-path="${path}" data-orig="${esc(cell.value||'')}">${esc(cell.value||'')}</div>`+
         (locked?`<div class="lockbadge">🔒 你锁定的</div>`:"")+
         (cites?`<div class="cellcites">${cites}</div>`:"")+`</td>`;
    });
    h+="</tr>";
  });
  h+="</tbody></table>";$("#art").innerHTML=h;
  $("#art").querySelectorAll(".cell[contenteditable]").forEach(c=>{
    c.addEventListener("blur",()=>onEdit(c));
  });
}
let pendingPath=null,pendingVal=null;
function onEdit(c){
  const v=c.textContent.trim(),orig=c.dataset.orig;
  if(v===orig||!v){return;}
  pendingPath=c.dataset.path;pendingVal=v;
  const r=c.getBoundingClientRect();const bar=$("#editbar");
  bar.style.display="flex";bar.style.left=Math.max(8,r.left)+"px";bar.style.top=(window.scrollY+r.bottom+6)+"px";
}
async function patch(intent){
  const bar=$("#editbar");bar.style.display="none";
  if(!pendingPath)return;
  await fetch("/api/artifact",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:sid,baseVersion:version,ops:[{path:pendingPath,op:"set",value:pendingVal,intent}]})});
  // pin:本地立即反映锁定;continue:等 SSE 推回新产物
  if(intent==="pin"){if(curArt){const[rk,ck]=pendingPath.split("/");const row=curArt.rows.find(r=>r.key===rk);const cell=row&&row.cells.find(x=>x.colKey===ck);if(cell){cell.value=pendingVal;cell.locked=true;cell.origin="user";}version++;renderArt(curArt);} logEvt("","🔒 已锁定 "+pendingPath);}
  else{logEvt("run","↻ 按你的改法继续顺一遍…");}
  pendingPath=pendingVal=null;
}
$(".editbar .pin").onclick=()=>patch("pin");
$(".editbar .cont").onclick=()=>patch("continue");
document.addEventListener("mousedown",e=>{if(!e.target.closest(".editbar")&&!e.target.closest(".cell"))$("#editbar").style.display="none";});

async function start(){
  const t=$("#intent").value.trim();if(!t||!sid)return;
  $("#intake").style.display="none";$("#shell").style.display="grid";started=true;
  logEvt("","你:"+esc(t));
  await fetch("/api/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:sid,intentText:t})});
}
async function refine(){
  const t=$("#cinp").value.trim();if(!t)return;$("#cinp").value="";logEvt("","你:"+esc(t));
  await fetch("/api/message",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:sid,text:t,artifactSnapshot:curArt})});
}
$("#go").onclick=start;$("#csend").onclick=refine;
$("#redo").onclick=()=>{const t=prompt("换个方向(会重做,但你锁定的格会保留):");if(t)fetch("/api/message",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:sid,text:t,artifactSnapshot:curArt})});};
boot();
</script></body></html>
