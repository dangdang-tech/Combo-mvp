name: Cloud Review

on:
  # 固定 Review 槽只由主体验分支自动更新；其他 ref 通过 workflow_dispatch 显式选择，
  # 避免任意 codex/* 分支 push 意外覆盖用户正在验收的版本。
  push:
    branches: ['codex/agent-studio-cloud-preview']
  workflow_dispatch:
    inputs:
      ref:
        description: 要构建并部署到固定 Cloud Review 槽位的分支或 SHA
        required: true
        default: main
      public_base_url:
        description: 公网验证 URL；留空使用 Environment variable CLOUD_REVIEW_BASE_URL
        required: false
        type: string

concurrency:
  group: combo-cloud-review-single-slot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve:
    name: resolve ref + validate manifests
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.revision.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - id: revision
        name: Resolve immutable image tag
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.4

      - name: Render Cloud Review kustomizations
        run: |
          kubectl kustomize --load-restrictor=LoadRestrictionsNone infra/k8s/overlays/cloud-review/platform >/dev/null
          kubectl kustomize --load-restrictor=LoadRestrictionsNone infra/k8s/overlays/cloud-review/migrate >/dev/null
          kubectl kustomize --load-restrictor=LoadRestrictionsNone infra/k8s/overlays/cloud-review/apps >/dev/null
          kubectl kustomize --load-restrictor=LoadRestrictionsNone infra/k8s/overlays/cloud-review >/dev/null

      - name: Enforce Cloud Review namespace ownership
        run: |
          grep -qx 'namespace: combo-review' infra/k8s/overlays/cloud-review/platform/kustomization.yaml
          grep -qx 'namespace: combo-review' infra/k8s/overlays/cloud-review/migrate/kustomization.yaml
          grep -qx 'namespace: combo-review' infra/k8s/overlays/cloud-review/apps/kustomization.yaml
          if grep -R -nE '^(namespace:|  name:) combo-preview$|\.combo-preview\.svc' \
            infra/k8s/overlays/cloud-review; then
            echo 'Cloud Review must not write the Combo development namespace.' >&2
            exit 1
          fi

      - name: Parse deployment scripts
        run: |
          bash -n \
            scripts/deploy-cloud-review.sh \
            scripts/recover-cloud-review-secrets.sh \
            scripts/release-cloud-review-nodeports.sh \
            scripts/cloud-review-smoke.sh

  images:
    name: build + push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: resolve
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: combo-api
            dockerfile: infra/Dockerfile.api
          - image: combo-runtime
            dockerfile: infra/Dockerfile.runtime
          - image: combo-web
            dockerfile: infra/Dockerfile.web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare preview build metadata
        if: matrix.image == 'combo-web'
        id: web_build_args
        env:
          BUILD_SHA: ${{ needs.resolve.outputs.sha }}
          REVIEW_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
        run: |
          {
            echo 'value<<EOF'
            echo 'VITE_DEPLOY_ENV=preview'
            echo "VITE_BUILD_SHA=$BUILD_SHA"
            echo "VITE_REVIEW_SOURCE=$REVIEW_SOURCE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ steps.web_build_args.outputs.value }}
          tags: ghcr.io/dangdang-tech/${{ matrix.image }}:${{ needs.resolve.outputs.sha }}
          cache-from: type=gha,scope=cloud-review-${{ matrix.image }}
          cache-to: type=gha,scope=cloud-review-${{ matrix.image }},mode=max

  deploy:
    name: deploy fixed combo-review slot
    runs-on: ubuntu-latest
    needs: [resolve, images]
    environment: cloud-review
    env:
      REVIEW_ROOT: /opt/combo/cloud-review
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Configure SSH
        env:
          # Repositories transferred from the original owner may retain the
          # shared deploy tuple while the environment-specific key is restored.
          DEPLOY_SSH_KEY: ${{ secrets.CLOUD_REVIEW_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.CLOUD_REVIEW_SSH_KEY && secrets.CLOUD_REVIEW_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.CLOUD_REVIEW_SSH_KEY && secrets.CLOUD_REVIEW_USER || secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/cloud_review_key
          chmod 600 ~/.ssh/cloud_review_key
          ssh-keygen -y -f ~/.ssh/cloud_review_key >/dev/null
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          {
            echo 'Host cloud-review-target'
            echo "  HostName $DEPLOY_HOST"
            echo "  User $DEPLOY_USER"
            echo '  IdentityFile ~/.ssh/cloud_review_key'
            echo '  StrictHostKeyChecking yes'
            echo '  ServerAliveInterval 30'
            echo '  ServerAliveCountMax 20'
          } >> ~/.ssh/config

      - name: Sync review-only manifests and scripts
        run: |
          ssh cloud-review-target "mkdir -p $REVIEW_ROOT/infra/k8s $REVIEW_ROOT/scripts"
          rsync -az --delete infra/k8s/ cloud-review-target:"$REVIEW_ROOT/infra/k8s/"
          rsync -az \
            scripts/deploy-cloud-review.sh \
            scripts/recover-cloud-review-secrets.sh \
            scripts/release-cloud-review-nodeports.sh \
            scripts/cloud-review-smoke.sh \
            cloud-review-target:"$REVIEW_ROOT/scripts/"

      - name: Release legacy review NodePorts
        run: ssh cloud-review-target bash "$REVIEW_ROOT/scripts/release-cloud-review-nodeports.sh"

      - name: Refresh preview image pull credential
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_TOKEN"
          ssh cloud-review-target \
            "kubectl apply -f $REVIEW_ROOT/infra/k8s/overlays/cloud-review/platform/namespace.yaml >/dev/null"
          python3 - <<'PY' | ssh cloud-review-target 'kubectl apply -f - >/dev/null'
          import base64
          import json
          import os

          username = os.environ["GHCR_USERNAME"]
          token = os.environ["GHCR_TOKEN"]
          auth = base64.b64encode(f"{username}:{token}".encode("utf-8")).decode("ascii")
          docker_config = {
              "auths": {
                  "ghcr.io": {
                      "username": username,
                      "password": token,
                      "auth": auth,
                  }
              }
          }
          manifest = {
              "apiVersion": "v1",
              "kind": "Secret",
              "metadata": {
                  "name": "combo-preview-ghcr-pull",
                  "namespace": "combo-review",
              },
              "type": "kubernetes.io/dockerconfigjson",
              "data": {
                  ".dockerconfigjson": base64.b64encode(
                      json.dumps(docker_config, separators=(",", ":")).encode("utf-8")
                  ).decode("ascii")
              },
          }
          print(json.dumps(manifest, separators=(",", ":")))
          PY

      - name: Restore preview-only secrets if missing
        env:
          REVIEW_ACCESS_TOKEN: ${{ secrets.CLOUD_REVIEW_ACCESS_TOKEN }}
        run: |
          test -n "$REVIEW_ACCESS_TOKEN"
          printf '%s' "$REVIEW_ACCESS_TOKEN" |
            ssh cloud-review-target env \
              SECRET_ROOT="$REVIEW_ROOT/secrets" \
              SRC_ROOT="$REVIEW_ROOT/infra/k8s" \
              bash "$REVIEW_ROOT/scripts/recover-cloud-review-secrets.sh"

      - name: Sync preview LLM configuration
        env:
          OPENROUTER_API_KEY: ${{ secrets.CLOUD_REVIEW_OPENROUTER_API_KEY }}
          RUNTIME_LLM_PROVIDER: ${{ vars.CLOUD_REVIEW_LLM_PROVIDER }}
          RUNTIME_LLM_MODEL: ${{ vars.CLOUD_REVIEW_LLM_MODEL }}
        run: |
          test -n "$OPENROUTER_API_KEY"
          test "$RUNTIME_LLM_PROVIDER" = openrouter
          test -n "$RUNTIME_LLM_MODEL"
          python3 - <<'PY' | ssh cloud-review-target \
            'kubectl -n combo-review patch secret combo-preview-env --type merge --patch-file /dev/stdin'
          import base64
          import json
          import os

          values = {
              "OPENROUTER_API_KEY": os.environ["OPENROUTER_API_KEY"],
              "RUNTIME_LLM_PROVIDER": os.environ["RUNTIME_LLM_PROVIDER"],
              "RUNTIME_LLM_MODEL": os.environ["RUNTIME_LLM_MODEL"],
          }
          payload = {
              "data": {
                  name: base64.b64encode(value.encode("utf-8")).decode("ascii")
                  for name, value in values.items()
              }
          }
          print(json.dumps(payload, separators=(",", ":")))
          PY

      - name: Deploy after migration succeeds
        env:
          SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          ssh cloud-review-target env \
            SHA="$SHA" \
            SRC_ROOT="$REVIEW_ROOT/infra/k8s" \
            bash "$REVIEW_ROOT/scripts/deploy-cloud-review.sh"

      - name: Public smoke
        env:
          REVIEW_BASE_URL: ${{ inputs.public_base_url || vars.CLOUD_REVIEW_BASE_URL }}
          REVIEW_ACCESS_TOKEN: ${{ secrets.CLOUD_REVIEW_ACCESS_TOKEN }}
        run: bash scripts/cloud-review-smoke.sh

      - name: Result
        run: echo "Cloud Review 已部署 ${{ needs.resolve.outputs.sha }}；独立槽位 combo-review 公网冒烟通过。"
