name: Publish Logto branding

on:
  workflow_dispatch:

concurrency:
  group: logto-branding-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Validate and publish hosted sign-in experience
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate tracked theme
        run: |
          node --test scripts/publish-logto-branding.test.mjs
          node scripts/publish-logto-branding.mjs --dry-run

      - name: Publish through Logto Management API
        env:
          LOGTO_ENDPOINT: ${{ vars.LOGTO_ENDPOINT }}
          LOGTO_MANAGEMENT_APP_ID: ${{ secrets.LOGTO_MANAGEMENT_APP_ID }}
          LOGTO_MANAGEMENT_APP_SECRET: ${{ secrets.LOGTO_MANAGEMENT_APP_SECRET }}
          LOGTO_BRANDING_LOGO_URL: ${{ vars.LOGTO_BRANDING_LOGO_URL }}
          LOGTO_BRANDING_DARK_LOGO_URL: ${{ vars.LOGTO_BRANDING_DARK_LOGO_URL }}
          LOGTO_BRANDING_FAVICON_URL: ${{ vars.LOGTO_BRANDING_FAVICON_URL }}
          LOGTO_BRANDING_DARK_FAVICON_URL: ${{ vars.LOGTO_BRANDING_DARK_FAVICON_URL }}
        run: node scripts/publish-logto-branding.mjs --apply
