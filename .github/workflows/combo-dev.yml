name: Test deployment

on:
  workflow_dispatch:
    inputs:
      revision:
        description: 任一当前仓库分支可达、由受信任成员选择的完整提交 SHA。
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  authorize:
    name: authorize actor and reachable revision
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      revision: ${{ steps.revision.outputs.revision }}
    steps:
      - name: Authorize a trusted repository actor
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          permission=$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${ACTOR}/permission" --jq '.permission')
          role=$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${ACTOR}/permission" --jq '.role_name // ""')
          case "$permission:$role" in
            admin:*|write:*|*:maintain) ;;
            *)
              echo 'Test deployment requires repository write, maintain, or admin permission.' >&2
              exit 1
              ;;
          esac

      - name: Select an immutable revision
        id: revision
        env:
          INPUT_REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          [[ "$INPUT_REVISION" =~ ^[0-9a-f]{40}$ ]] || { echo 'Invalid immutable revision.' >&2; exit 1; }
          printf 'revision=%s\n' "$INPUT_REVISION" >> "$GITHUB_OUTPUT"

      - name: Check out exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.revision.outputs.revision }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify the revision is reachable from a repository branch
        env:
          GH_TOKEN: ${{ github.token }}
          REVISION: ${{ steps.revision.outputs.revision }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/commits/${REVISION}" --jq '.sha' \
            | grep -Fx "$REVISION" >/dev/null
          [[ "$(git rev-parse HEAD)" == "$REVISION" ]]
          git diff --quiet
          git diff --cached --quiet
          remote_main=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')
          [[ "$remote_main" =~ ^[0-9a-f]{40}$ ]]
          reachable=false
          while IFS= read -r branch_sha; do
            [[ "$branch_sha" =~ ^[0-9a-f]{40}$ ]] || exit 1
            status=$(gh api \
              "repos/${GITHUB_REPOSITORY}/compare/${REVISION}...${branch_sha}" \
              --jq '.status')
            if [[ "$status" == ahead || "$status" == identical ]]; then
              reachable=true
              break
            fi
          done < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" \
              --jq '.[].commit.sha'
          )
          [[ "$reachable" == true ]] || {
            echo 'Test revision is not reachable from any current repository branch.' >&2
            exit 1
          }

  release:
    name: run secretless gates and build the Test release
    needs: authorize
    permissions:
      actions: read
      contents: read
      packages: write
    uses: ./.github/workflows/ci.yml
    with:
      revision: ${{ needs.authorize.outputs.revision }}
      publish_release: true

  deploy:
    name: deploy the trusted release to Test
    needs: [authorize, release]
    concurrency:
      group: cd-tecent2
      queue: max
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: combo-dev
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out the exact release source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.authorize.outputs.revision }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download the immutable release artifact
        uses: actions/download-artifact@v4
        with:
          name: combo-release-${{ needs.authorize.outputs.revision }}
          path: ${{ runner.temp }}/combo-release

      - name: Verify the artifact and expose its immutable images
        id: images
        env:
          REVISION: ${{ needs.authorize.outputs.revision }}
          RELEASE_ROOT: ${{ runner.temp }}/combo-release
        run: |
          set -euo pipefail
          (
            cd "$RELEASE_ROOT"
            sha256sum -c metadata/artifact-files.sha256 >/dev/null
          )
          manifest_digest=$(<"$RELEASE_ROOT/metadata/release-manifest-digest.txt")
          node scripts/release-manifest.mjs verify \
            --manifest "$RELEASE_ROOT/metadata/release.json" \
            --source-sha "$REVISION" \
            --digest "$manifest_digest" >/dev/null
          api=$(jq -er '.images.api' "$RELEASE_ROOT/metadata/release.json")
          runtime=$(jq -er '.images.runtime' "$RELEASE_ROOT/metadata/release.json")
          web=$(jq -er '.images.web' "$RELEASE_ROOT/metadata/release.json")
          [[ "$api" =~ ^ghcr\.io/dangdang-tech/combo-api@sha256:[0-9a-f]{64}$ ]]
          [[ "$runtime" =~ ^ghcr\.io/dangdang-tech/combo-runtime@sha256:[0-9a-f]{64}$ ]]
          [[ "$web" =~ ^ghcr\.io/dangdang-tech/combo-web@sha256:[0-9a-f]{64}$ ]]
          printf 'api=%s\nruntime=%s\nweb=%s\n' "$api" "$runtime" "$web" >> "$GITHUB_OUTPUT"

      - name: Render and enforce the deployment contract
        env:
          REVISION: ${{ needs.authorize.outputs.revision }}
          RELEASE_ROOT: ${{ runner.temp }}/combo-release
          API_IMAGE: ${{ steps.images.outputs.api }}
          RUNTIME_IMAGE: ${{ steps.images.outputs.runtime }}
          WEB_IMAGE: ${{ steps.images.outputs.web }}
        run: |
          set -euo pipefail
          rendered=$(mktemp)
          trap 'rm -f "$rendered"' EXIT
          bash scripts/combo-dev-deploy.sh --render-only \
            --output "$rendered" \
            --api-image "$API_IMAGE" \
            --runtime-image "$RUNTIME_IMAGE" \
            --web-image "$WEB_IMAGE" \
            --revision "$REVISION" \
            --release-manifest "$RELEASE_ROOT/metadata/release.json" \
            --release-manifest-digest-file "$RELEASE_ROOT/metadata/release-manifest-digest.txt"
          [[ -s "$rendered" ]]

      - name: Build the allowlisted deployment bundle
        id: bundle
        env:
          REVISION: ${{ needs.authorize.outputs.revision }}
          RELEASE_ROOT: ${{ runner.temp }}/combo-release
          API_IMAGE: ${{ steps.images.outputs.api }}
          RUNTIME_IMAGE: ${{ steps.images.outputs.runtime }}
          WEB_IMAGE: ${{ steps.images.outputs.web }}
        run: |
          set -euo pipefail
          root=$(mktemp -d)
          trap 'rm -rf "$root"' EXIT
          mkdir -p "$root/metadata" "$root/infra/k8s/overlays/combo-dev" "$root/infra/host/combo-dev" "$root/scripts"
          overlay_files=(
            kustomization.yaml
            platform/kustomization.yaml platform/limit-range.yaml platform/namespace.yaml
            platform/network-policies.yaml platform/quota.yaml platform/rbac.yaml
            platform/storage-class.yaml platform/storage-volumes.yaml
            foundation/kustomization.yaml foundation/postgres-entrypoint.sh foundation/resources.yaml
            init/kustomization.yaml init/minio-app-policy.json init/resources.yaml
            migrate/kustomization.yaml migrate/resources.yaml
            apps/kustomization.yaml apps/nginx-dev.conf apps/resources.yaml
          )
          for relative in "${overlay_files[@]}"; do
            install -D -m 0644 "infra/k8s/overlays/combo-dev/$relative" \
              "$root/infra/k8s/overlays/combo-dev/$relative"
          done
          cp infra/host/combo-dev/README.md \
             infra/host/combo-dev/combo-dev-web-forward.service \
             infra/host/combo-dev/combo-dev-s3-forward.service \
             infra/host/combo-dev/combo-dev-storage-guard.service \
             infra/host/combo-dev/combo-dev-storage-guard.timer "$root/infra/host/combo-dev/"
          cp scripts/combo-dev-bootstrap.sh scripts/combo-dev-deploy.sh scripts/combo-dev-smoke.sh \
             scripts/combo-dev-connect.sh scripts/combo-dev-logs.sh scripts/combo-dev-reset.sh \
             scripts/combo-dev-forwarder-lease.sh scripts/combo-dev-storage-guard.sh \
             scripts/combo-dev-production-safety.py "$root/scripts/"
          printf '%s\n' "$REVISION" > "$root/metadata/revision"
          printf 'API_IMAGE=%s\nRUNTIME_IMAGE=%s\nWEB_IMAGE=%s\n' \
            "$API_IMAGE" "$RUNTIME_IMAGE" "$WEB_IMAGE" > "$root/metadata/image-digests.txt"
          install -m 0600 \
            "$RELEASE_ROOT/metadata/release.json" \
            "$RELEASE_ROOT/metadata/release-manifest-digest.txt" \
            "$root/metadata/"
          if find "$root" -type l -print -quit | grep -q .; then echo 'Bundle contains a symlink.' >&2; exit 1; fi
          if find "$root" -type f \( -name '.env' -o -name '.env.*' -o -name '*secret*' \) -print -quit | grep -q .; then
            echo 'Bundle contains a prohibited configuration file.' >&2; exit 1
          fi
          if grep -RIEq --exclude='*.md' -- '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|gh[pousr]_[A-Za-z0-9]{30,}|AKIA[0-9A-Z]{16}' "$root"; then
            echo 'Bundle failed credential-pattern scanning.' >&2; exit 1
          fi
          archive="$RUNNER_TEMP/combo-dev-${REVISION}.tar.gz"
          tar -C "$root" -czf "$archive" metadata infra/k8s/overlays/combo-dev infra/host/combo-dev scripts
          chmod 600 "$archive"
          printf 'archive=%s\n' "$archive" >> "$GITHUB_OUTPUT"

      - name: Configure pinned development SSH identity
        env:
          SSH_KEY: ${{ secrets.COMBO_DEV_SSH_KEY }}
          SSH_HOST: ${{ secrets.COMBO_DEV_SSH_HOST }}
          SSH_USER: ${{ secrets.COMBO_DEV_SSH_USER }}
          SSH_KNOWN_HOSTS: ${{ secrets.COMBO_DEV_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          [[ "$SSH_HOST" =~ ^[A-Za-z0-9._:-]+$ ]] || { echo 'Invalid development host metadata.' >&2; exit 1; }
          [[ "$SSH_USER" =~ ^[A-Za-z_][A-Za-z0-9_-]*$ ]] || { echo 'Invalid development user metadata.' >&2; exit 1; }
          [[ -n "$SSH_KEY" && -n "$SSH_KNOWN_HOSTS" ]] || { echo 'Missing development SSH material.' >&2; exit 1; }
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/combo_dev"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/combo_dev_known_hosts"
          chmod 600 "$HOME/.ssh/combo_dev" "$HOME/.ssh/combo_dev_known_hosts"
          ssh-keygen -F "$SSH_HOST" -f "$HOME/.ssh/combo_dev_known_hosts" >/dev/null 2>&1 || {
            echo 'Pinned host identity does not cover the configured host.' >&2; exit 1;
          }
          {
            echo 'Host combo-dev-target'
            echo "  HostName $SSH_HOST"
            echo "  User $SSH_USER"
            echo '  IdentityFile ~/.ssh/combo_dev'
            echo '  UserKnownHostsFile ~/.ssh/combo_dev_known_hosts'
            echo '  IdentitiesOnly yes'
            echo '  StrictHostKeyChecking yes'
            echo '  BatchMode yes'
            echo '  ServerAliveInterval 30'
            echo '  ServerAliveCountMax 20'
            echo '  TCPKeepAlive yes'
            echo '  LogLevel ERROR'
          } > "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"

      - name: Prove development ports are not remotely reachable before deployment
        env:
          SSH_HOST: ${{ secrets.COMBO_DEV_SSH_HOST }}
        run: |
          set -euo pipefail
          for port in 18080 19000; do
            if timeout 4 bash -c "</dev/tcp/${SSH_HOST}/${port}" 2>/dev/null; then
              echo 'A development port is remotely reachable.' >&2
              exit 1
            fi
          done

      - name: Upload the fixed bundle and invoke the root-owned dispatcher
        env:
          ARCHIVE: ${{ steps.bundle.outputs.archive }}
          REVISION: ${{ needs.authorize.outputs.revision }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          [[ "$RUN_ID" =~ ^[0-9]+$ && "$RUN_ATTEMPT" =~ ^[0-9]+$ ]] || exit 1
          remote="/opt/combo-dev/incoming/${REVISION}.tar.gz"
          temporary="/opt/combo-dev/incoming/.${REVISION}.${RUN_ID}.${RUN_ATTEMPT}.upload"
          cleanup_upload() {
            ssh combo-dev-target rm -f -- "$temporary" >/dev/null 2>&1 || true
          }
          trap cleanup_upload EXIT
          ssh combo-dev-target test -d /opt/combo-dev/incoming
          cleanup_upload
          scp -q "$ARCHIVE" "combo-dev-target:$temporary"
          ssh combo-dev-target mv -fT -- "$temporary" "$remote"
          ssh combo-dev-target bash -s -- "$remote" "$REVISION" <<'REMOTE'
          set -euo pipefail
          bundle=$1
          revision=$2
          [[ "$bundle" == "/opt/combo-dev/incoming/${revision}.tar.gz" ]]
          [[ "$revision" =~ ^[0-9a-f]{40}$ ]]
          install -d -m 0750 "$HOME/data"
          exec 9>"$HOME/data/combo-release-mutation.lock"
          flock -w 300 9
          sudo /opt/combo-dev/bin/combo-dev-reset \
            --confirm=DESTROY-COMBO-PREVIEW-DATA
          sudo /opt/combo-dev/bin/combo-dev-deploy \
            --bundle "$bundle" \
            --revision "$revision"
          REMOTE

      - name: Prove development ports remain private
        env:
          SSH_HOST: ${{ secrets.COMBO_DEV_SSH_HOST }}
        run: |
          set -euo pipefail
          for port in 18080 19000; do
            if timeout 4 bash -c "</dev/tcp/${SSH_HOST}/${port}" 2>/dev/null; then
              echo 'A development port is remotely reachable.' >&2
              exit 1
            fi
          done

      - name: Remove transient runner and upload files
        if: always()
        env:
          ARCHIVE: ${{ steps.bundle.outputs.archive }}
          REVISION: ${{ needs.authorize.outputs.revision }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set +e
          cleanup_rc=0
          if [[ "$REVISION" =~ ^[0-9a-f]{40}$ && "$RUN_ID" =~ ^[0-9]+$ && "$RUN_ATTEMPT" =~ ^[0-9]+$ && -f "$HOME/.ssh/config" ]]; then
            ssh combo-dev-target rm -f -- \
              "/opt/combo-dev/incoming/${REVISION}.tar.gz" \
              "/opt/combo-dev/incoming/.${REVISION}.${RUN_ID}.${RUN_ATTEMPT}.upload" \
              >/dev/null 2>&1 || cleanup_rc=1
          fi
          rm -f -- "$ARCHIVE" "$HOME/.ssh/combo_dev" "$HOME/.ssh/combo_dev_known_hosts" "$HOME/.ssh/config"
          if (( cleanup_rc != 0 )); then echo 'Remote transient cleanup could not be confirmed.' >&2; fi
          exit "$cleanup_rc"
