# CD：部署到 tecent2 的单机 k3s（2026-07-17 起从 docker compose 切换，割接记录见 issue #86）。
# 当前只保留手动入口：Production 必须显式选择已经由 main CI 构建的完整提交 SHA。
# main 后续默认部署 Preview；在同源晋级链路完成前，Production 固定在最后一次人工选择的版本。
#
# 前置约定：
#   镜像由 CI 在 main push 时构建并推送 GHCR（tag = 完整 commit SHA），本 workflow 只拉不建。
#   服务器上有固定部署目录 /opt/combo：infra/ 放 k8s 清单与各服务配置（由本 workflow 每次同步覆盖），
#   其中 .env 是唯一不同步的文件（密钥只存在服务器上，不进 git 也不进 Actions）。
#   集群侧长期凭据（combo-env / ghcr-pull 两个 Secret）在集群里，不经过本 workflow。
#   compose 编排文件保留在仓库与服务器上仅作回滚兜底（数据卷冻结在割接时刻），不再被本 workflow 使用。
#
# 所需 Secrets：
#   DEPLOY_SSH_KEY —— 专用部署私钥（对应公钥在服务器 authorized_keys）
#   DEPLOY_HOST / DEPLOY_USER —— 服务器地址与登录用户（仓库 public，不在 yml 里明文写）
name: CD

on:
  workflow_dispatch:
    inputs:
      revision:
        description: 要部署到 Production 的完整 main 提交 SHA；该提交必须已有成功的 main CI。
        required: true
        type: string

# 同一时间只允许一个部署在跑；后触发的排队而不是取消前一个（部署中途被杀会留半成品栈）。
concurrency:
  group: cd-tecent2
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy selected main revision to Production
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
    steps:
      - name: 校验不可变 main revision 与成功 CI
        id: rev
        env:
          GH_TOKEN: ${{ github.token }}
          REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          [[ "$REVISION" =~ ^[0-9a-f]{40}$ ]] || { echo 'Production revision 必须是完整提交 SHA。' >&2; exit 1; }
          git_object=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${REVISION}" --jq '.sha')
          [[ "$git_object" == "$REVISION" ]] || exit 1
          on_main=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${REVISION}...main" --jq '.status')
          [[ "$on_main" == ahead || "$on_main" == identical ]] || {
            echo 'Production revision 必须可从 main 到达。' >&2
            exit 1
          }
          success=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${REVISION}&status=completed&per_page=100" \
            --jq '[.workflow_runs[] | select(.head_sha == "'"$REVISION"'" and .head_branch == "main" and .event == "push" and .conclusion == "success")] | length > 0')
          [[ "$success" == true ]] || { echo 'Production revision 没有成功的 main CI。' >&2; exit 1; }
          printf 'sha=%s\n' "$REVISION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.rev.outputs.sha }}
          persist-credentials: false

      - name: 确认 checkout 与输入一致
        env:
          REVISION: ${{ steps.rev.outputs.sha }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$REVISION" ]]
          git diff --quiet
          git diff --cached --quiet

      # 镜像不存在就提前失败（比如 ref 指了还没跑完 CI 的提交），绝不带着缺镜像去动线上栈。
      - name: 校验三镜像已在 GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for img in combo-api combo-runtime combo-web; do
            docker manifest inspect "ghcr.io/dangdang-tech/${img}:${{ steps.rev.outputs.sha }}" > /dev/null \
              || { echo "缺镜像 ${img}:${{ steps.rev.outputs.sha }}——等 CI 的 image job 跑完再部署"; exit 1; }
          done

      - name: 配置 SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          {
            echo "Host deploy-target"
            echo "  HostName $DEPLOY_HOST"
            echo "  User $DEPLOY_USER"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  StrictHostKeyChecking yes"
          } >> ~/.ssh/config

      # 部署清单以仓库为准同步；.env 受排除规则保护。Sandbox Tools 的镜像定义与
      # 两个可选 overlay 不传输；同步后只删除服务器上这三个固定路径的旧残留。
      - name: 同步部署清单到服务器
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='/Dockerfile.sandboxd' \
            --exclude='/k8s/overlays/sandbox-tools/' \
            --exclude='/k8s/overlays/sandbox-tools-fifth-slot/' \
            infra/ deploy-target:/opt/combo/infra/
          ssh deploy-target 'rm -rf -- \
            /opt/combo/infra/Dockerfile.sandboxd \
            /opt/combo/infra/k8s/overlays/sandbox-tools \
            /opt/combo/infra/k8s/overlays/sandbox-tools-fifth-slot'
          rsync -az scripts/smoke.sh scripts/deploy-k8s.sh deploy-target:/opt/combo/scripts/

      # 镜像由集群内 ghcr-pull Secret 拉取，服务器上不再需要 docker login。
      - name: k8s 滚动部署（migrate Job 先行，rollout 等四个业务面就绪）
        env:
          SHA: ${{ steps.rev.outputs.sha }}
        run: |
          ssh deploy-target env SHA="$SHA" bash /opt/combo/scripts/deploy-k8s.sh

      # 割接后 web 走 NodePort 30080（系统 nginx 反代到这里）；nginx 会把 /health /ready /api/* 反代给 api，
      # 冒烟的 API 探测与 WEB 探测统一走这个入口，等价于用户真实路径。
      - name: 冒烟验证
        run: |
          ssh deploy-target '
            set -euo pipefail
            LOGTO_ISSUER=$(grep "^LOGTO_ISSUER=" /opt/combo/infra/.env | cut -d= -f2-)
            API_BASE=http://localhost:30080 WEB_BASE=http://localhost:30080 LOGTO_ISSUER="$LOGTO_ISSUER" \
              bash /opt/combo/scripts/smoke.sh
          '

      - name: 部署结果
        run: echo "已人工选择并部署 main@${{ steps.rev.outputs.sha }} 到 Production，tecent2 冒烟通过。"
