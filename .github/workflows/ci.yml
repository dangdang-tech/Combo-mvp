# CI（O-07）。creator-builder monorepo 已提升为仓库根，故 .github/workflows/ 落在仓库根、被 GitHub Actions 正常识别，
# 所有步骤直接以仓库根（= monorepo 根）为工作目录，无需再 working-directory 限定。
#
# 四个 job：
#   gate —— install / lint / typecheck / build / test / compose 配置自查。
#   integration —— 起 PG/Redis 双实例，跑数据库迁移、Runtime 终态栅栏与 Redis 分工断言。
#   sandbox-integration —— 在 Docker internal network 内跑真实 Pi 工具与 sandboxd 竖切。
#   image —— 构建三个现有生产镜像；不发布可选 sandboxd。
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint / typecheck / build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/sandboxd/go.mod
          cache-dependency-path: apps/sandboxd/go.sum

      # 只安装客户端供 opt-in overlay 做本地 kustomize 静态断言，不连接或修改集群。
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared first (apps depend on its dist + .d.ts)
        run: pnpm -F @cb/shared build

      # eslint 含分层依赖规则：authoring worker 不得导入 HTTP app，Runtime 模型工具不得导入宿主文件或进程 API。
      - name: Lint (incl. layering rules)
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck tests
        run: pnpm typecheck:test

      - name: Build (all packages + apps)
        run: pnpm build

      - name: Verify production artifacts
        run: bash scripts/check-production-artifacts.sh

      - name: Test
        run: pnpm test

      - name: Compose config self-check (structural, no up)
        # 结构自检只做 YAML/引用校验、不起容器。compose 里必填变量用 ${VAR:?}（生产禁默认，安全刻意）
        # 故此处注入一次性占位值让插值通过——绝不改 compose 的「生产禁默认」约束。
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          S3_ACCESS_KEY: ci
          S3_SECRET_KEY: ci
          LOGTO_APP_ID: ci
          LOGTO_APP_SECRET: ci
          LOGTO_AUDIENCE: ci
          LOGTO_ISSUER: http://logto:3001/oidc
          LOGTO_JWKS_URI: http://logto:3001/oidc/jwks
          LOGTO_REDIRECT_URI: http://ci.local/callback
          GRAFANA_ADMIN_PASSWORD: ci
          DEV_SESSION_SECRET: ci
          IMAGE_TAG: ci
        run: |
          docker compose -f infra/docker-compose.yml config -q && echo "base compose config valid"
          docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml config -q && echo "prod overlay config valid"

      - name: ShellCheck scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh scripts/integration/*.sh infra/entrypoint.sh infra/postgres/init-logto-db.sh infra/minio/init-buckets.sh infra/k8s/overlays/sandbox-tools/maintenance/*.sh

  integration:
    name: integration (db migrate + redis dual)
    runs-on: ubuntu-latest
    needs: gate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
          POSTGRES_DB: agora
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U agora" --health-interval 5s --health-timeout 3s --health-retries 10
      redis_queue:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
      redis_hot:
        image: redis:7
        ports: ['6380:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install psql + redis-cli clients
        run: sudo apt-get update && sudo apt-get install -y postgresql-client redis-tools

      # Service 容器以默认配置起（无法挂自定义 conf），故用 CONFIG SET 注入双实例对立策略后再断言。
      - name: Apply redis dual-instance policies (service containers)
        run: |
          redis-cli -h localhost -p 6379 config set maxmemory-policy noeviction
          redis-cli -h localhost -p 6379 config set appendonly yes
          redis-cli -h localhost -p 6380 config set maxmemory-policy allkeys-lru

      - name: Integration · db migrate
        env:
          DATABASE_URL: postgres://agora:agora@localhost:5432/agora
        run: bash scripts/integration/db-migrate.sh

      - name: Integration · runtime terminal fence
        env:
          RUNTIME_TERMINAL_FENCE_DATABASE_URL: postgres://agora:agora@localhost:5432/agora
          RUNTIME_TERMINAL_FENCE_REDIS_URL: redis://localhost:6380
        run: pnpm --dir apps/runtime exec vitest run src/__tests__/terminal-fence.integration.test.ts

      - name: Integration · redis dual
        env:
          REDIS_QUEUE_HOST: localhost
          REDIS_QUEUE_PORT: '6379'
          REDIS_HOT_HOST: localhost
          REDIS_HOT_PORT: '6380'
        run: bash scripts/integration/redis-dual.sh

  sandbox-integration:
    name: sandbox protocol/process/path (Docker)
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Install
        run: pnpm install --frozen-lockfile

      # 只启动 Docker internal network 内的临时 sandboxd 与协议驱动；不连接或修改集群。
      - name: Sandbox authenticated vertical slice
        env:
          SANDBOX_E2E_REQUIRE_LOOPBACK: '1'
        run: bash scripts/integration/sandbox-tools-local.sh

  # 三镜像构建（api/runtime/web）。PR 上只构建作守门；push main 时额外推送 GHCR：
  #   tag 打两枚——完整 commit SHA（CD 按 SHA 部署与回滚）+ latest（人查看最新用，部署不依赖它）。
  #   buildx 的 GitHub Actions 层缓存按镜像名分 scope，避免三镜像互相冲刷缓存。
  image:
    name: docker image build+push (api + runtime + web)
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: combo-api
            dockerfile: infra/Dockerfile.api
          - image: combo-runtime
            dockerfile: infra/Dockerfile.runtime
          - image: combo-web
            dockerfile: infra/Dockerfile.web
    env:
      SHOULD_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR (main push 才需要)
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 仓库根即 monorepo 根：build context 与 -f 路径均相对仓库根。
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: |
            ghcr.io/dangdang-tech/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/dangdang-tech/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
