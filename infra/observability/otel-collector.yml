extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog/docker:
    include:
      - /var/lib/docker/containers/*/*.log
    start_at: end
    include_file_path: true
    operators:
      - type: json_parser
        parse_from: body
      - type: move
        from: attributes.log
        to: body
      - type: json_parser
        id: parse_app_json_log
        parse_from: body
        if: body matches "^\\{"
        on_error: send

processors:
  batch:
    timeout: 2s
    send_batch_size: 1024
  resource/defaults:
    attributes:
      - key: service.namespace
        value: agora-mvp
        action: upsert

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource/defaults, batch]
      exporters: [otlphttp/tempo]
    logs:
      receivers: [otlp, filelog/docker]
      processors: [resource/defaults, batch]
      exporters: [otlphttp/loki]
