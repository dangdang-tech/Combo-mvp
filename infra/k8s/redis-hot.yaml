apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-hot-config
data:
  redis.conf: |
    # redis_hot（70 §8.1 / 技术方案 §6.1）：事件 Streams / 控制流 / 锁 / 限流；热缓存可驱逐、无须持久化。
    # 不开 AOF、关 RDB 快照（无数据卷）；满了按 LRU 驱逐。与 redis_queue 的 noeviction+AOF 策略对立，必须物理分实例。
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    appendonly no
    save ""
---
apiVersion: v1
kind: Service
metadata:
  name: redis-hot
  labels:
    app: redis-hot
spec:
  selector:
    app: redis-hot
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-hot
  labels:
    app: redis-hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-hot
  template:
    metadata:
      labels:
        app: redis-hot
    spec:
      containers:
        - name: redis
          image: redis:7
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 640Mi
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/redis/redis.conf
              subPath: redis.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: redis-hot-config
