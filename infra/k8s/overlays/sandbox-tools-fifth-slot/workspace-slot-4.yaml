apiVersion: v1
kind: PersistentVolume
metadata:
  name: combo-sandbox-workspace-slot-4
  labels:
    app.kubernetes.io/part-of: combo
    app.kubernetes.io/component: model-sandbox-workspace
    sandbox.combo.dev/slot: '4'
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: combo-sandbox-loopback
  claimRef:
    namespace: combo-sandbox
    name: combo-sandbox-workspace-slot-4
  local:
    path: /var/lib/combo-sandbox-slots/slot-4
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [sandbox-node.invalid]
  mountOptions: [nodev, nosuid]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: combo-sandbox-workspace-slot-4
  namespace: combo-sandbox
  labels:
    app.kubernetes.io/part-of: combo
    app.kubernetes.io/component: model-sandbox-workspace
    sandbox.combo.dev/slot: '4'
spec:
  accessModes: [ReadWriteOnce]
  volumeMode: Filesystem
  storageClassName: combo-sandbox-loopback
  volumeName: combo-sandbox-workspace-slot-4
  resources:
    requests:
      storage: 1Gi
