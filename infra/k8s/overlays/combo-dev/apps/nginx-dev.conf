map $http_origin $combo_dev_origin_allowed {
  default 0;
  "" 1;
  "http://127.0.0.1:18080" 1;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  access_log off;
  error_log /dev/stderr crit;
  server_tokens off;
  client_max_body_size 32m;
  client_body_temp_path /var/cache/nginx/client_temp 1 2;

  resolver ${NGINX_RESOLVER} ipv6=off valid=10s;
  set $api_host ${API_UPSTREAM_HOST};
  set $runtime_host ${RUNTIME_UPSTREAM_HOST};

  if ($combo_dev_origin_allowed = 0) { return 403; }

  location = /runtime-config.json {
    alias /var/run/combo-web/runtime-config.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /version.json {
    alias /var/run/combo-web/version.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /try/runtime-config.json {
    alias /var/run/combo-web/try-runtime-config.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /api/v1/client-events {
    access_log off;
    log_not_found off;
    add_header Cache-Control "no-store" always;
    return 204;
  }

  location ~ ^/api/v1/tasks/.+/events$ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;
  }

  location = /_combo-dev/runtime/health {
    proxy_pass http://$runtime_host:3100/health;
    proxy_set_header Host $http_host;
  }

  location = /_combo-dev/runtime/ready {
    proxy_pass http://$runtime_host:3100/ready;
    proxy_set_header Host $http_host;
  }

  location ^~ /api/v1/runtime/ {
    proxy_pass http://$runtime_host:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;
  }

  location ^~ /try/ {
    alias /usr/share/nginx/html/try/;
    try_files $uri $uri/ /try/index.html;
  }

  location ~ ^/api/v1/connect/(prepare|upload)$ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_body_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_request_buffering on;
  }

  location /api/ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(health|ready)$ {
    proxy_pass http://$api_host:3000;
    proxy_set_header Host $http_host;
  }
}
