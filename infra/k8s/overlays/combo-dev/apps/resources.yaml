---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: web
  name: web
  namespace: combo-preview
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: web
        combo.dev/environment: combo-dev
    spec:
      automountServiceAccountToken: false
      containers:
        - env:
            - name: API_UPSTREAM_HOST
              value: api.combo-preview.svc.cluster.local
            - name: RUNTIME_UPSTREAM_HOST
              value: runtime.combo-preview.svc.cluster.local
            - name: NGINX_RESOLVER
              value: 10.43.0.10
          image: ghcr.io/dangdang-tech/combo-web:latest
          name: web
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 100m
              ephemeral-storage: 256Mi
              memory: 128Mi
            requests:
              cpu: 25m
              ephemeral-storage: 64Mi
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/nginx/templates/default.conf.template
              name: nginx-template
              readOnly: true
              subPath: default.conf.template
            - mountPath: /etc/nginx/conf.d
              name: nginx-conf
            - mountPath: /var/cache/nginx
              name: nginx-cache
            - mountPath: /var/run
              name: nginx-run
            - mountPath: /tmp
              name: tmp
      imagePullSecrets:
        - name: combo-dev-registry
      securityContext:
        fsGroup: 101
        runAsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - configMap:
            name: combo-dev-nginx
          name: nginx-template
        - emptyDir:
            sizeLimit: 16Mi
          name: nginx-conf
        - emptyDir:
            sizeLimit: 64Mi
          name: nginx-cache
        - emptyDir:
            sizeLimit: 8Mi
          name: nginx-run
        - emptyDir:
            sizeLimit: 32Mi
          name: tmp
---
