apiVersion: v1
kind: Service
metadata:
  labels:
    app: api
  name: api
  namespace: combo-preview
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: api
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: runtime
  name: runtime
  namespace: combo-preview
spec:
  ports:
    - name: http
      port: 3100
      targetPort: 3100
  selector:
    app: runtime
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: web
  name: web
  namespace: combo-preview
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8080
  selector:
    app: web
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api
  name: api
  namespace: combo-preview
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: api
        combo.dev/environment: combo-dev
    spec:
      automountServiceAccountToken: false
      containers:
        - env:
            - name: NODE_ENV
              value: development
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/cache
            - name: LOG_LEVEL
              value: warn
            - name: DEV_LOGIN_ENABLED
              value: 'true'
            - name: DEV_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  key: DEV_SESSION_SECRET
                  name: combo-dev-session
            - name: OTEL_SDK_DISABLED
              value: 'true'
            - name: REDIS_QUEUE_URL
              value: redis://redis-queue:6379/0
            - name: REDIS_HOT_URL
              value: redis://redis-hot:6379/0
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_PUBLIC_ENDPOINT
              value: http://127.0.0.1:19000
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: S3_ACCESS_KEY
                  name: combo-dev-env
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: S3_SECRET_KEY
                  name: combo-dev-env
            - name: LOGTO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  key: LOGTO_ENDPOINT
                  name: combo-dev-env
            - name: LOGTO_ISSUER
              valueFrom:
                secretKeyRef:
                  key: LOGTO_ISSUER
                  name: combo-dev-env
            - name: LOGTO_JWKS_URI
              valueFrom:
                secretKeyRef:
                  key: LOGTO_JWKS_URI
                  name: combo-dev-env
            - name: LOGTO_APP_ID
              valueFrom:
                secretKeyRef:
                  key: LOGTO_APP_ID
                  name: combo-dev-env
            - name: LOGTO_APP_SECRET
              valueFrom:
                secretKeyRef:
                  key: LOGTO_APP_SECRET
                  name: combo-dev-env
            - name: LOGTO_AUDIENCE
              valueFrom:
                secretKeyRef:
                  key: LOGTO_AUDIENCE
                  name: combo-dev-env
            - name: LOGTO_REDIRECT_URI
              value: http://127.0.0.1:18080/api/v1/auth/callback
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  key: ANTHROPIC_API_KEY
                  name: combo-dev-env
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  key: OPENROUTER_API_KEY
                  name: combo-dev-env
                  optional: true
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  key: LLM_PROVIDER
                  name: combo-dev-env
                  optional: true
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  key: LLM_BASE_URL
                  name: combo-dev-env
                  optional: true
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  key: LLM_MODEL
                  name: combo-dev-env
                  optional: true
            - name: PROCESS
              value: api
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '3000'
            - name: S3_REGION
              value: us-east-1
            - name: OTEL_SERVICE_NAME
              value: cb-authoring-api
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_USER
                  name: combo-dev-env
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_PASSWORD
                  name: combo-dev-env
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_DB
                  name: combo-dev-env
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          image: ghcr.io/dangdang-tech/combo-api:latest
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          name: api
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 400m
              ephemeral-storage: 1Gi
              memory: 768Mi
            requests:
              cpu: 150m
              ephemeral-storage: 256Mi
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      imagePullSecrets:
        - name: combo-dev-registry
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir:
            sizeLimit: 256Mi
          name: tmp
---
