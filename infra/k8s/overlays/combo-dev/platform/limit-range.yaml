apiVersion: v1
kind: LimitRange
metadata:
  name: combo-dev-defaults
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 25m
        memory: 32Mi
        ephemeral-storage: 64Mi
      default:
        cpu: 250m
        memory: 256Mi
        ephemeral-storage: 512Mi
      max:
        cpu: '1'
        memory: 2Gi
        ephemeral-storage: 2Gi
    - type: PersistentVolumeClaim
      min:
        storage: 1Gi
      max:
        storage: 10Gi
