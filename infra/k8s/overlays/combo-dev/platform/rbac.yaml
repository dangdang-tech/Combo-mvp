apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: combo-dev-dispatcher
  namespace: combo-preview
rules:
  - apiGroups: ['']
    resources: ['configmaps', 'services']
    verbs: ['create', 'get', 'list', 'watch', 'patch', 'update', 'delete']
  - apiGroups: ['']
    resources: ['persistentvolumeclaims']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'watch', 'delete']
  - apiGroups: ['']
    resources: ['pods/log']
    verbs: ['get']
  - apiGroups: ['']
    resources: ['pods/portforward']
    verbs: ['create']
  - apiGroups: ['']
    resources: ['secrets']
    resourceNames: ['combo-dev-session']
    verbs: ['patch', 'update']
  - apiGroups: ['apps']
    resources: ['deployments', 'statefulsets']
    verbs: ['create', 'get', 'list', 'watch', 'patch', 'update', 'delete']
  - apiGroups: ['batch']
    resources: ['jobs']
    verbs: ['create', 'get', 'list', 'watch', 'patch', 'delete']
  - apiGroups: ['networking.k8s.io']
    resources: ['networkpolicies']
    verbs: ['create', 'get', 'list', 'watch', 'patch', 'update', 'delete']
  - apiGroups: ['']
    resources: ['resourcequotas', 'limitranges']
    resourceNames: ['combo-dev-ceiling', 'combo-dev-defaults']
    verbs: ['get', 'patch', 'update']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: combo-dev-dispatcher
  namespace: combo-preview
subjects:
  - kind: User
    apiGroup: rbac.authorization.k8s.io
    name: combo-dev-dispatcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: combo-dev-dispatcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: combo-dev-fencer
  namespace: combo-preview
rules:
  - apiGroups: ['apps']
    resources: ['deployments']
    resourceNames: ['api', 'worker', 'runtime', 'web', 'redis-hot']
    verbs: ['get']
  - apiGroups: ['apps']
    resources: ['deployments/scale']
    resourceNames: ['api', 'worker', 'runtime', 'web', 'redis-hot']
    verbs: ['patch']
  - apiGroups: ['apps']
    resources: ['statefulsets']
    resourceNames: ['postgres', 'redis-queue', 'minio']
    verbs: ['get']
  - apiGroups: ['apps']
    resources: ['statefulsets/scale']
    resourceNames: ['postgres', 'redis-queue', 'minio']
    verbs: ['patch']
  - apiGroups: ['batch']
    resources: ['jobs']
    resourceNames: ['minio-init', 'migrate', 'combo-dev-network-canary']
    verbs: ['get', 'delete']
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'delete']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: combo-dev-fencer
  namespace: combo-preview
subjects:
  - kind: User
    apiGroup: rbac.authorization.k8s.io
    name: combo-dev-fencer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: combo-dev-fencer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: combo-dev-control-auditor
rules:
  - apiGroups: ['']
    resources: ['persistentvolumes']
    resourceNames: ['combo-dev-postgres', 'combo-dev-redis-queue', 'combo-dev-minio']
    verbs: ['get']
  - apiGroups: ['storage.k8s.io']
    resources: ['storageclasses']
    resourceNames: ['combo-dev-bounded']
    verbs: ['get']
  - apiGroups: ['']
    resources: ['namespaces']
    verbs: ['get', 'list']
  - apiGroups: ['rbac.authorization.k8s.io']
    resources: ['roles', 'rolebindings', 'clusterroles', 'clusterrolebindings']
    verbs: ['get', 'list']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: combo-dev-control-auditor
subjects:
  - kind: User
    apiGroup: rbac.authorization.k8s.io
    name: combo-dev-dispatcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: combo-dev-control-auditor
