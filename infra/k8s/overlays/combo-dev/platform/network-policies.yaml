---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authoring-internal-egress
spec:
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [api, worker] }
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels: { app: postgres }
      ports:
        - { protocol: TCP, port: 5432 }
    - to:
        - podSelector:
            matchLabels: { app: redis-queue }
      ports:
        - { protocol: TCP, port: 6379 }
    - to:
        - podSelector:
            matchLabels: { app: redis-hot }
      ports:
        - { protocol: TCP, port: 6379 }
    - to:
        - podSelector:
            matchLabels: { app: minio }
      ports:
        - { protocol: TCP, port: 9000 }
---
