apiVersion: v1
kind: PersistentVolume
metadata:
  name: combo-dev-postgres
  labels:
    combo.dev/environment: combo-dev
    combo.dev/volume: postgres
spec:
  capacity:
    storage: 8Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: combo-dev-bounded
  claimRef:
    namespace: combo-preview
    name: data-postgres-0
  local:
    path: /home/xingzheng/data/combo-dev/postgres
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - COMBO_DEV_NODE_HOSTNAME
---
