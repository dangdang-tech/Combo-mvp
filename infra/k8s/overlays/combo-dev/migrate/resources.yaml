apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app: migrate
  name: migrate
  namespace: combo-preview
spec:
  activeDeadlineSeconds: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: migrate
        combo.dev/environment: combo-dev
    spec:
      automountServiceAccountToken: false
      containers:
        - command:
            - node
            - --experimental-strip-types
            - db/scripts/migrate.ts
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_USER
                  name: combo-dev-env
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_PASSWORD
                  name: combo-dev-env
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_DB
                  name: combo-dev-env
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          image: ghcr.io/dangdang-tech/combo-api:latest
          name: migrate
          resources:
            limits:
              cpu: 300m
              ephemeral-storage: 512Mi
              memory: 512Mi
            requests:
              cpu: 100m
              ephemeral-storage: 128Mi
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      imagePullSecrets:
        - name: combo-dev-registry
      restartPolicy: Never
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - emptyDir:
            sizeLimit: 128Mi
          name: tmp
  ttlSecondsAfterFinished: 300
