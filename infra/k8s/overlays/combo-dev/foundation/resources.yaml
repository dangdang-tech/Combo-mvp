apiVersion: v1
data:
  redis.conf: |
    # redis_hot（70 §8.1 / 技术方案 §6.1）：事件 Streams / 控制流 / 锁 / 限流；热缓存可驱逐、无须持久化。
    # 不开 AOF、关 RDB 快照（无数据卷）；满了按 LRU 驱逐。与 redis_queue 的 noeviction+AOF 策略对立，必须物理分实例。
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly no
    save ""
kind: ConfigMap
metadata:
  name: redis-hot-config
  namespace: combo-preview
---
apiVersion: v1
data:
  redis.conf: |
    # redis_queue（70 §8.1 / 技术方案 §6.1）：仅 BullMQ 队列；绝不被驱逐、AOF 持久化（队列丢失 = 丢任务触发）。
    appendonly yes
    appendfsync everysec
    maxmemory 384mb
    maxmemory-policy noeviction
kind: ConfigMap
metadata:
  name: redis-queue-config
  namespace: combo-preview
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: minio
  name: minio
  namespace: combo-preview
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
  selector:
    app: minio
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: postgres
  name: postgres
  namespace: combo-preview
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: postgres
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: redis-hot
  name: redis-hot
  namespace: combo-preview
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: redis-hot
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: redis-queue
  name: redis-queue
