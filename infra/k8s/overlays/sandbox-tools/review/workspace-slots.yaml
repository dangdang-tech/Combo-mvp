apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: combo-review-sandbox-loopback
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: false
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: combo-sandbox-workspace-slot-0
  labels:
    app.kubernetes.io/part-of: combo
    app.kubernetes.io/component: model-sandbox-workspace
    sandbox.combo.dev/slot: '0'
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: combo-review-sandbox-loopback
  claimRef:
    namespace: combo-review-sandbox
    name: combo-sandbox-workspace-slot-0
  local:
    path: /var/lib/combo-review-sandbox-slots/slot-0
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [vm-0-12-opencloudos]
  mountOptions: [nodev, nosuid]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: combo-sandbox-workspace-slot-0
  namespace: combo-review-sandbox
  labels:
    app.kubernetes.io/part-of: combo
    app.kubernetes.io/component: model-sandbox-workspace
    sandbox.combo.dev/slot: '0'
spec:
  accessModes: [ReadWriteOnce]
  volumeMode: Filesystem
  storageClassName: combo-review-sandbox-loopback
  volumeName: combo-sandbox-workspace-slot-0
  resources:
    requests:
      storage: 1Gi
---
