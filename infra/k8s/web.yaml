apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
spec:
  # 系统 nginx 后续切流量时应反向代理到节点的 30080 端口。
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: web
          image: ghcr.io/dangdang-tech/combo-web:latest
          env:
            # 镜像里的 nginx 配置是 envsubst 模板：k8s 里 resolver 必须指 CoreDNS（k3s 默认 10.43.0.10），
            # upstream 用 Service 全限定名——nginx 的 resolver 不应用 search 域，短名解析不到。
            - name: NGINX_RESOLVER
              value: 10.43.0.10
            - name: API_UPSTREAM_HOST
              value: api.combo.svc.cluster.local
            - name: RUNTIME_UPSTREAM_HOST
              value: runtime.combo.svc.cluster.local
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 128Mi
