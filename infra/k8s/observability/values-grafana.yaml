# 管理员密码不落盘，README 的安装命令会从服务器环境变量通过 --set 注入。
adminUser: admin

persistence:
  enabled: true
  storageClassName: local-path
  size: 2Gi

service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30300

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

grafana.ini:
  # 2026-07-17 起有公网域名（grafana.43-160-242-46.sslip.io），匿名访问关闭：
  # 日志与业务指标不能对公网裸奔，一律 admin 登录（密码在 /opt/combo/infra/.env 的 GRAFANA_ADMIN_PASSWORD）。
  auth.anonymous:
    enabled: false
  analytics:
    reporting_enabled: false
  users:
    # Grafana 13 官方配置：[users] default_language 接受受支持的 IETF 语言标签。
    # 来源：https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#default_language
    default_language: zh-Hans

# 数据源使用 Helm release 生成的集群内 Service 名；Loki 通过 gateway，Tempo 直接访问单实例服务。
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc.cluster.local
        isDefault: true
        jsonData:
          maxLines: 1000
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: -5m
            spanEndTimeShift: 5m
            filterByTraceID: true
            filterBySpanID: false
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.observability.svc.cluster.local
        jsonData:
          httpMethod: POST

# 直接把现有 trace-debug.json 纳入 chart 的文件 provisioning，部署后无需手工导入。
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: combo-observability
        orgId: 1
        folder: Combo MVP
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/combo

# ConfigMap 看板由 sidecar 写入独立的默认目录，与 combo-observability 的 /var/lib/grafana/dashboards/combo 共存。
# 字段来源（grafana-community/grafana values）：https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: '1'
    folderAnnotation: grafana_folder
    provider:
      # 目录注解要配合按目录结构建文件夹才生效，否则全部落进 General。
      foldersFromFilesStructure: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

dashboards:
  combo:
    trace-debug:
      json: |
        {
          "annotations": {"list": []},
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "links": [],
          "liveNow": false,
          "panels": [{
            "datasource": {"type": "loki", "uid": "loki"},
            "fieldConfig": {"defaults": {}, "overrides": []},
            "gridPos": {"h": 18, "w": 24, "x": 0, "y": 0},
            "id": 1,
            "options": {"dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true, "showCommonLabels": false, "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true},
            "targets": [{"datasource": {"type": "loki", "uid": "loki"}, "expr": "{service_namespace=\"combo-mvp\"} | json | traceId=\"$traceId\"", "refId": "A"}],
            "title": "按反馈 Trace ID 查询日志",
            "type": "logs"
          }],
          "refresh": "",
          "schemaVersion": 39,
          "tags": ["combo", "trace"],
          "templating": {"list": [{"current": {"selected": false, "text": "", "value": ""}, "hide": 0, "label": "Trace ID（链路标识）", "name": "traceId", "query": "", "skipUrlSync": false, "type": "textbox"}]},
          "time": {"from": "now-6h", "to": "now"},
          "timezone": "",
          "title": "Trace 排障",
          "uid": "combo-trace-debug",
          "version": 1,
          "weekStart": ""
        }
