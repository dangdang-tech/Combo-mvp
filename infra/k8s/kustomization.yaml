apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: combo
resources:
  - namespace.yaml
  - postgres.yaml
  - redis-queue.yaml
  - redis-hot.yaml
  - minio.yaml
  - job-minio-init.yaml
  - job-migrate.yaml
  - api.yaml
  - worker.yaml
  - runtime.yaml
  - web.yaml
images:
  # 部署前应使用 `kustomize edit set image`，或直接把 newTag 改成被部署提交的完整 SHA。
  - name: ghcr.io/dangdang-tech/combo-api
    newTag: latest
  - name: ghcr.io/dangdang-tech/combo-runtime
    newTag: latest
  - name: ghcr.io/dangdang-tech/combo-web
    newTag: latest
