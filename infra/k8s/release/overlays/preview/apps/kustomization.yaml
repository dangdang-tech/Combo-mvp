apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: combo-review
namePrefix: release-
resources:
  - ../../../base/apps
patches:
  - path: dev-session.patch.yaml
  - path: ../../app-selector-isolation.patch.yaml
labels:
  - includeSelectors: true
    pairs:
      combo.build/release-track: release-v1
