apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-queue-config
data:
  redis.conf: |
    # redis_queue（70 §8.1 / 技术方案 §6.1）：仅 BullMQ 队列；绝不被驱逐、AOF 持久化（队列丢失 = 丢任务触发）。
    appendonly yes
    appendfsync everysec
    maxmemory-policy noeviction
---
apiVersion: v1
kind: Service
metadata:
  name: redis-queue
  labels:
    app: redis-queue
spec:
  selector:
    app: redis-queue
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-queue
  labels:
    app: redis-queue
spec:
  serviceName: redis-queue
  replicas: 1
  selector:
    matchLabels:
      app: redis-queue
  template:
    metadata:
      labels:
        app: redis-queue
    spec:
      containers:
        - name: redis
          image: redis:7
          command: ['redis-server', '/usr/local/etc/redis/redis.conf']
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ['redis-cli', 'ping']
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 768Mi
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/redis/redis.conf
              subPath: redis.conf
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: redis-queue-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
