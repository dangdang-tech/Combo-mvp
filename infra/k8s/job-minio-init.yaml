apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-init-script
data:
  init-buckets.sh: |
    #!/bin/sh
    # 一次性 minio_mc 容器入口（O-02）：建 ObjectStore 四桶（70 §8.2）。minio healthy 后跑、跑完退。幂等可重入。
    # 四桶：combo-raw（去敏快照）/ combo-artifacts（产物）/ combo-exports（导出）/ combo-experience（经验体语料）。
    set -eu

    S3_ENDPOINT="${S3_ENDPOINT:-http://minio:9000}"
    S3_ACCESS_KEY="${S3_ACCESS_KEY:-minioadmin}"
    S3_SECRET_KEY="${S3_SECRET_KEY:-minioadmin}"

    # 配置别名（重试等待 minio 起来；healthcheck 已 gate，这里只做容错重试）
    i=0
    until mc alias set local "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY" >/dev/null 2>&1; do
      i=$((i + 1))
      if [ "$i" -ge 30 ]; then
        echo "[init-buckets] cannot reach minio at $S3_ENDPOINT" >&2
        exit 1
      fi
      sleep 2
    done

    for bucket in combo-raw combo-artifacts combo-exports combo-experience; do
      # mb 已存在不报错（--ignore-existing → 幂等）
      mc mb --ignore-existing "local/${bucket}"
      echo "[init-buckets] ensured bucket '${bucket}'"
    done

    echo "[init-buckets] done"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  labels:
    app: minio-init
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc
          command: ["/bin/sh", "/scripts/init-buckets.sh"]
          env:
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: combo-env
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: combo-env
                  key: S3_SECRET_KEY
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: minio-init-script
            defaultMode: 0555
