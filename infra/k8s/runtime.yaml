apiVersion: v1
kind: Service
metadata:
  name: runtime
  labels:
    app: runtime
spec:
  selector:
    app: runtime
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime
  labels:
    app: runtime
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: runtime
  template:
    metadata:
      labels:
        app: runtime
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: runtime
          image: ghcr.io/dangdang-tech/combo-runtime:latest
          env:
            - name: NODE_ENV
              value: production
            - name: DEV_LOGIN_ENABLED
              value: "false"
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3100"
            # runtime 的代码契约要求 REDIS_URL，不能使用 authoring 的 REDIS_QUEUE_URL 替代。
            - name: REDIS_URL
              value: redis://redis-queue:6379
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_REGION
              value: us-east-1
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: combo-env, key: POSTGRES_USER}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: combo-env, key: POSTGRES_PASSWORD}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: {name: combo-env, key: POSTGRES_DB}
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: {name: combo-env, key: S3_ACCESS_KEY}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: {name: combo-env, key: S3_SECRET_KEY}
            - name: LOGTO_ISSUER
              valueFrom:
                secretKeyRef: {name: combo-env, key: LOGTO_ISSUER}
            - name: LOGTO_JWKS_URI
              valueFrom:
                secretKeyRef: {name: combo-env, key: LOGTO_JWKS_URI}
            - name: LOGTO_AUDIENCE
              valueFrom:
                secretKeyRef: {name: combo-env, key: LOGTO_AUDIENCE}
            # LLM 相关键允许缺失（代码契约：缺 key 只降级不阻塞启动），必须 optional，
            # 否则 Secret 缺键时 Pod 直接 CreateContainerConfigError 起不来。
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: {name: combo-env, key: ANTHROPIC_API_KEY, optional: true}
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef: {name: combo-env, key: OPENROUTER_API_KEY, optional: true}
            - name: RUNTIME_LLM_PROVIDER
              valueFrom:
                secretKeyRef: {name: combo-env, key: RUNTIME_LLM_PROVIDER, optional: true}
            - name: RUNTIME_LLM_MODEL
              valueFrom:
                secretKeyRef: {name: combo-env, key: RUNTIME_LLM_MODEL, optional: true}
          ports:
            - name: http
              containerPort: 3100
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          # readiness 必须访问会检查全部依赖的 /ready，不能照抄 compose 的 /health。
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
