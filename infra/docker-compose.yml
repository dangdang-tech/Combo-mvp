# 本地全栈编排（O-02/O-03）。本期【只写不跑】：无 Docker，留作后续 compose up。
#
# 固定启动顺序（技术方案 §6.2，硬性）：
#   postgres → logto_db_seed → logto_alteration → logto → migrate(业务迁移) → 业务容器(api/worker/consumer/sweeper/web)
#   Logto OSS 不自跑迁移：必须先 CLI `db seed` 建表，再把 `db alteration deploy` 作为单实例一次性 job 跑；跑完才起 logto 运行态。
#   业务迁移与 Logto 迁移各自独立 schema/库（agora / logto），互不干扰；任一迁移失败即止、不起后续。
#
# Redis 物理拆两实例（70 §8.1 / 技术方案 §6.1）：
#   redis_queue（appendonly AOF + noeviction，BullMQ 队列绝不被驱逐）/ redis_hot（maxmemory + allkeys-lru，事件 Streams/锁/限流，可驱逐、无持久卷）。
#   两实例 compose/健康检查/env 全部独立——混一实例会让 noeviction 与 eviction 互相污染（队列被驱逐 = 丢任务触发）。
#
# 健康检查（O-04）：postgres/redis_queue/redis_hot/minio 用各自原生探针；logto 断言 OIDC discovery（issuer/jwks_uri）；
#   api 用 /health（liveness、轻量不查依赖，业务就绪由 /ready 自查五依赖）。
#
# 镜像：api/worker 同镜像不同入口（PROCESS 环境变量分叉，见 Dockerfile.api ENTRYPOINT）；web 单独 nginx 镜像。
#
# 生产密钥不允许默认 fallback（Codex#13）：
#   本编排即生产栈（业务容器 NODE_ENV=production）。真密钥用 `${VAR:?...}` 必填形式——未设则 `docker compose` 直接报错中止，
#   绝不静默注入 minioadmin / agora:agora 这类默认凭据上生产（与 apps/api env.ts 的生产守卫双保险）。
#   非密钥的运行参数（端口/region/由服务名推导的 endpoint）保留默认。dev 直跑请用 .env 显式提供这些值。
services:
  # ───────────────────────── 数据与中间件（先起，业务/Logto 都依赖）─────────────────────────
  postgres:
    image: postgres:16
    environment:
      # 密钥/连接身份必填（Codex#13）：未设即中止启动，绝不默认 agora:agora。
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER 必填（生产禁默认）}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必填（生产禁默认）}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB 必填（生产禁默认）}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 首次启动建 logto 独立库（业务库 agora 与身份库 logto 同实例、不同 database，§6.1）
      - ./postgres/init-logto-db.sh:/docker-entrypoint-initdb.d/10-init-logto-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:?} -d ${POSTGRES_DB:?}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis_queue:
    image: redis:7
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-queue.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_queue_data:/data # AOF 落盘，队列绝不丢（noeviction）
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  redis_hot:
    image: redis:7
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-hot.conf:/usr/local/etc/redis/redis.conf:ro
      # 热态实例可驱逐、无须持久化（事件 Streams/锁/限流），故不挂数据卷
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      # 对象存储密钥必填（Codex#13）：未设即中止，绝不默认 minioadmin。
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY 必填（生产禁默认）}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY 必填（生产禁默认）}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  # 一次性容器：建四桶（agora-raw/artifacts/exports/experience，70 §8.2）。minio healthy 后跑、跑完退。幂等。
  minio_mc:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/scripts/init-buckets.sh']
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY 必填（生产禁默认）}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY 必填（生产禁默认）}
    volumes:
      - ./minio/init-buckets.sh:/scripts/init-buckets.sh:ro
    restart: 'no'

  # ───────────────────────── Observability（Trace ID 排障：Grafana + Loki + Tempo + OTel Collector）─────────────────────────
  loki:
    image: grafana/loki:3.5.0
    command: ['-config.file=/etc/loki/loki.yml']
    ports:
      - '3100:3100'
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

  tempo:
    image: grafana/tempo:2.9.0
    command: ['-config.file=/etc/tempo/tempo.yml']
    ports:
      - '3200:3200'
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3200/ready >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.135.0
    command: ['--config=/etc/otelcol/config.yml']
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    ports:
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol/config.yml:ro
      # 本地自托管日志入口：tail Docker JSON stdout/stderr，保留应用 JSON 日志里的 traceId/trace_id/span_id。
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:13133/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:12.1.1
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD 必填（生产禁默认）}
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - '3003:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

  # ───────────────────────── Logto 身份（一次性 seed/alteration → 运行态）─────────────────────────
  # 一次性容器（首次部署跑一次，跑完退出）：CLI `logto db seed`，Logto OSS 不自跑迁移，必须先 seed 建表 + 初始数据。幂等可重入。
  logto_db_seed:
    image: svhd/logto:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgres://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/logto
      # CI=true：非交互，避免 CLI 等待人工确认而卡死（alteration/seed 在容器里无 TTY）
      CI: 'true'
    entrypoint: ['sh', '-c', 'npm run cli db seed -- --swe']
    restart: 'no'

  # 一次性 job（版本升级跑、单实例）：CLI `logto db alteration deploy`，schema alteration 必须单实例跑（多实例并发会破坏 schema）。
  # CI=true + 显式目标版本（LOGTO_DB_ALTERATION_TARGET）避免非交互卡住（技术方案 O-02）。
  logto_alteration:
    image: svhd/logto:latest
    depends_on:
      logto_db_seed:
        condition: service_completed_successfully
    environment:
      DB_URL: postgres://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/logto
      CI: 'true'
    # 目标版本固定到镜像内置最新（next）；显式传 target 避免交互式选择卡住
    entrypoint: ['sh', '-c', 'npm run cli db alteration deploy ${LOGTO_DB_ALTERATION_TARGET:-next}']
    restart: 'no'

  # 自托管身份提供方（Auth 唯一方案）：自身不建表，依赖 seed/alteration 完成后才起。
  logto:
    image: svhd/logto:latest
    depends_on:
      logto_alteration:
        condition: service_completed_successfully
    environment:
      DB_URL: postgres://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/logto
      # canonical issuer 单一权威（Codex#11-r4）：ENDPOINT 决定 Logto 铸 token 的 iss（= {ENDPOINT}/oidc），
      #   必须与 API 验签 issuer / healthcheck 断言 issuer 三者完全相等。compose 网内服务名统一用 logto:3001，
      #   故 ENDPOINT 默认 http://logto:3001（不再用 localhost:3001——那会让 iss 与 API 的 http://logto:3001/oidc 分裂）。
      ENDPOINT: ${LOGTO_ENDPOINT:-http://logto:3001}
      ADMIN_ENDPOINT: ${LOGTO_ADMIN_ENDPOINT:-http://logto:3002}
      TRUST_PROXY_HEADER: '1'
      # healthcheck 自检的 canonical issuer = {ENDPOINT}/oidc，与 API LOGTO_ISSUER 同值（消除 iss/ready/验签分裂）。
      LOGTO_ISSUER: ${LOGTO_ISSUER:-http://logto:3001/oidc}
    ports:
      - '3001:3001'
      - '3002:3002'
    # logto 运行态自身不再跑迁移（seed/alteration 已先行完成）
    entrypoint: ['sh', '-c', 'npm start']
    healthcheck:
      # 断言 OIDC discovery 可达，且 issuer 严格等于 LOGTO_ISSUER（不只是字段存在）+ jwks_uri 存在
      # （技术方案 §6.3 / O-04 / Codex#11；用 issuer 的 .well-known，不用 /api/.well-known）。
      # issuer 不等于配置值 = 配错 ENDPOINT/反代域名，OIDC 校验下游必崩，故 healthcheck 就拦住。
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(process.env.LOGTO_ISSUER+\"/.well-known/openid-configuration\").then(r=>r.json()).then(j=>{if(j.issuer!==process.env.LOGTO_ISSUER||!j.jwks_uri){process.exit(1)}}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ───────────────────────── 业务迁移（一次性，logto 起后、业务容器前）─────────────────────────
  # 业务迁移一次性容器：postgres healthy 后跑 `pnpm -F @cb/db migrate`，失败即止、不起业务容器。与 Logto 迁移各自独立库。
  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      # 满足固定启动序 postgres→logto seed/alteration→logto→migrate→业务（Codex#10）：
      #   logto healthy 已隐含 logto_alteration 成功完成（其 depends_on 链），故业务迁移等 logto 健康才跑。
      logto:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
    # 同镜像、覆盖入口跑迁移（runner 在镜像内 db/scripts/migrate.ts）
    entrypoint: ['node', '--experimental-strip-types', 'db/scripts/migrate.ts']
    restart: 'no'

  # ───────────────────────── 业务进程（同镜像四入口 + web nginx）─────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis_queue:
        condition: service_healthy
      redis_hot:
        condition: service_healthy
      minio:
        condition: service_healthy
      logto:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: test # 验收栈启用 dev-login；生产部署换回 production（双守卫自动关死）
      PORT: '3000'
      HOST: 0.0.0.0
      PROCESS: api
      DEV_LOGIN_ENABLED: 'true'
      DEV_SESSION_SECRET: ${DEV_SESSION_SECRET:?}
      DATABASE_URL: postgres://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      REDIS_QUEUE_URL: redis://redis_queue:6379/0
      REDIS_HOT_URL: redis://redis_hot:6379/0
      S3_ENDPOINT: http://minio:9000
      # 浏览器直传专用公网端点（BUG-013）：API 内网走 minio:9000，但浏览器拿到的 presigned URL 必须宿主可达。
      #   dev 默认 http://localhost:9000（minio 已 publish 9000）；生产设为对外 S3/CDN 公网端点。仅 API 服务需要（唯一 presign 方）。
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      # canonical issuer 三处一致（Codex#11-r4）：API 验签 iss / probeLogto(/ready) / logto healthcheck 同值。
      #   LOGTO_ISSUER 必须 == {logto ENDPOINT}/oidc（铸 token 的 iss），绝不分裂（compose 网内统一 logto:3001）。
      #   JWKS 走容器内网取，与 issuer 同主机（logto:3001），jose 仍以 canonical LOGTO_ISSUER 断言 iss（URL 与 iss 分离）。
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-http://logto:3001}
      LOGTO_ISSUER: ${LOGTO_ISSUER:-http://logto:3001/oidc}
      LOGTO_JWKS_URI: ${LOGTO_JWKS_URI:-http://logto:3001/oidc/jwks}
      # Logto application 凭据与回调必填（Codex#13）：生产禁空 fallback，未设即 compose 中止（与 env.ts 守卫双保险）。
      LOGTO_APP_ID: ${LOGTO_APP_ID:?LOGTO_APP_ID 必填（生产禁默认）}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:?LOGTO_APP_SECRET 必填（生产禁默认）}
      LOGTO_REDIRECT_URI: ${LOGTO_REDIRECT_URI:?LOGTO_REDIRECT_URI 必填（生产禁默认）}
      # JWT 受众必填（Codex#2）：api 生产无条件校 aud，缺则启动失败（与 env.ts 守卫双保险）。
      LOGTO_AUDIENCE: ${LOGTO_AUDIENCE:?LOGTO_AUDIENCE 必填（生产无条件校 aud）}
      # LLM key 例外：上游 degraded 不计 /ready，缺失只降级不阻塞启动，故保留空默认（与 env.ts 一致）。
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # LLM provider 选择 + OpenRouter（OpenAI 兼容）接线：同 degraded 语义，全部允许空（缺则降级不阻塞）。
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OTEL_SERVICE_NAME: cb-authoring-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose
    ports:
      - '3000:3000'
    healthcheck:
      # liveness：/health 轻量、不查依赖（依赖就绪由 /ready 自查，编排/LB 据 /ready 判定接流量）
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:3000/health\").then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    depends_on:
      redis_queue:
        condition: service_healthy
      redis_hot:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PROCESS: worker
      DATABASE_URL: postgres://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      REDIS_QUEUE_URL: redis://redis_queue:6379/0
      REDIS_HOT_URL: redis://redis_hot:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      OTEL_SERVICE_NAME: cb-authoring-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose

  # consumer 受保序约束不可多实例（启动拿 advisory lock/lease 防误 scale，70 §3.1）；不要 deploy.replicas > 1。
  runtime:
    build:
      context: ..
      dockerfile: infra/Dockerfile.runtime
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: test
      PORT: '3100'
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      LOGTO_ISSUER: ${LOGTO_ISSUER:?}
      LOGTO_JWKS_URI: ${LOGTO_JWKS_URI:?}
      LOGTO_AUDIENCE: ${LOGTO_AUDIENCE:?}
      DEV_LOGIN_ENABLED: 'true'
      DEV_SESSION_SECRET: ${DEV_SESSION_SECRET:?}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RUNTIME_LLM_PROVIDER: ${RUNTIME_LLM_PROVIDER:-}
      RUNTIME_LLM_MODEL: ${RUNTIME_LLM_MODEL:-anthropic/claude-sonnet-4.6}
      OTEL_SERVICE_NAME: cb-runtime-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose
    expose:
      - '3100'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3100/health\").then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
      runtime:
        condition: service_healthy
    ports:
      - '80:80'
    healthcheck:
      # 用 127.0.0.1 而非 localhost：容器内 busybox wget 会先解析 localhost→::1(IPv6)，
      # 而 nginx 默认只 listen IPv4 0.0.0.0:80 → IPv6 连接被拒、健康检查误判 unhealthy(host 侧服务实为正常)。
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  pgdata:
  redis_queue_data:
  miniodata:
  loki_data:
  tempo_data:
  grafana_data:
