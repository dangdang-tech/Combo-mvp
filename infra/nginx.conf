# nginx：静态前端 + /api 反代到 api 进程 + SSE 透传（关闭缓冲 + 长连接，脊柱 §5.1 / 技术方案 §6.1）。
# upstream 名 = compose 服务名 api，监听 3000。
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 动态解析 upstream：resolver + 变量化 proxy_pass，使 nginx【每次请求重新解析】api 的 IP。
  #   否则 nginx 只在启动时解析一次并缓存 IP——api 容器一旦重建换了 IP，web 仍打旧 IP → 502
  #   （用户实测：重建 api 后 /api、/health 全 502，须重启 web 才好）。valid=10s 限制缓存、ipv6=off 避免 AAAA 噪声。
  # 本文件是 envsubst 模板（见 Dockerfile.web）：resolver 地址与两个 upstream 主机名由环境变量注入。
  #   docker compose 用镜像默认值（127.0.0.11 内嵌 DNS + 服务短名）；k8s 部署必须覆盖成 CoreDNS 地址
  #   + Service 全限定名——nginx 的 resolver 不读 /etc/resolv.conf 也不应用其 search 域，短名在 k8s 里解析不到。
  resolver ${NGINX_RESOLVER} ipv6=off valid=10s;
  set $api_host ${API_UPSTREAM_HOST};
  set $runtime_host ${RUNTIME_UPSTREAM_HOST};

  # 请求体上限：配对上传 POST /connect/upload 的分片内容走 JSON body 经本 nginx 反代，
  #   放宽到 32m 与 api Fastify bodyLimit 对齐（助手侧按此上限切片）。
  client_max_body_size 32m;

  # 发布元数据由容器入口根据环境注入，同一 Web 镜像可在三个环境晋级。
  location = /runtime-config.json {
    alias /var/run/combo-web/runtime-config.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /version.json {
    alias /var/run/combo-web/version.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /try/runtime-config.json {
    alias /var/run/combo-web/try-runtime-config.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  location = /web-asset-manifest.json {
    try_files $uri =404;
    default_type application/json;
    add_header Cache-Control "no-store" always;
  }

  # Vite 带内容摘要的资源必须存在；缺失资源不能被 SPA fallback 伪装成 200 HTML。
  location ^~ /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ^~ /try/assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
  }

  location = /try/index.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
  }

  # SPA：未命中静态文件回退 index.html（前端路由 react-router）。
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
  }

  # SSE 端点：关代理缓冲、关 cache、长读超时、HTTP/1.1 长连接。
  # 匹配 /api/v1/tasks/{id}/events（任务进度流；runtime 的 /stream 由下方 /api/v1/runtime/ 整段覆盖）。
  location ~ ^/api/v1/tasks/.+/events$ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # 透传上游（边缘 nginx）的 X-Forwarded-Proto；直连本容器（无上游头）时为空，api 回落 req.protocol。
    #   修复：原先写死 $scheme=http，会把边缘的 https 覆盖成 http → connect/pair 算出 http BASE →
    #   助手脚本上传命中 80→443 跳转失败（用户实测）。
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    # 兼容部分中间层缓冲（nginx 自定义头，告知不缓冲）
    add_header X-Accel-Buffering no;
  }

  # —— 试用端 runtime（消费链路）：复用本 nginx，挂 /try/ + /api/v1/runtime/，反代到【跑在宿主】的 runtime-api ——
  #   runtime 是 compose 服务（docker 网络内 runtime:3100），用变量 + resolver 每请求重解析（同 $api_host 口径）。
  #   /api/v1/runtime/agui 是 AG-UI SSE 长连，故整段关缓冲 + 长读超时（普通读不受影响）。^~ 让它优先于下面的 /api/ 与正则。
  location ^~ /api/v1/runtime/ {
    proxy_pass http://$runtime_host:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;
  }

  # 试用端静态前端（vite base=/try/ 构建产物）。
  location ^~ /try/ {
    try_files $uri $uri/ /try/index.html;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
  }

  # 本机助手弱网上传：client_body_timeout 管客户端慢写，proxy_* 管请求转发与 API 响应。
  # 两个端点显式独立于普通 API，避免 nginx 默认 60s 在慢速请求/对象存储抖动时截断续传协议。
  location ~ ^/api/v1/connect/(prepare|upload)$ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    client_body_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_request_buffering on;
  }

  # 普通 API 反代（同源 Cookie 会话透传，§11.C）
  location /api/ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # 透传上游（边缘 nginx）的 X-Forwarded-Proto；直连本容器（无上游头）时为空，api 回落 req.protocol。
    #   修复：原先写死 $scheme=http，会把边缘的 https 覆盖成 http → connect/pair 算出 http BASE →
    #   助手脚本上传命中 80→443 跳转失败（用户实测）。
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # 基础设施探针（不在 /api/v1 前缀，脊柱 §10）
  location ~ ^/(health|ready)$ {
    proxy_pass http://$api_host:3000;
    proxy_set_header Host $host;
  }
}
