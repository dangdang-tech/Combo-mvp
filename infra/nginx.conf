# nginx：静态前端 + /api 反代到 api 进程 + SSE 透传（关闭缓冲 + 长连接，脊柱 §5.1 / 技术方案 §6.1）。
# upstream 名 = compose 服务名 api，监听 3000。
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 动态解析 upstream：用 docker 内嵌 DNS（127.0.0.11）+ 变量化 proxy_pass，使 nginx【每次请求重新解析】
  #   api 的 IP。否则 nginx 只在启动时解析一次并缓存 IP——api 容器一旦重建换了 IP，web 仍打旧 IP → 502
  #   （用户实测：重建 api 后 /api、/health 全 502，须重启 web 才好）。valid=10s 限制缓存、ipv6=off 避免 AAAA 噪声。
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_host api;
  set $runtime_host runtime;

  # 请求体上限：浏览器直传 B-20 的 presign 是「每文件一片」的 parts[] 元数据 JSON。导入 .codex / .claude
  #   整目录（成百上千个 session 文件）时这份元数据会超过 nginx 默认 1MB → 413（用户实测 .codex 目录命中）。
  #   原文字节是直传对象存储（MinIO，不经本 nginx），故这里只需容纳元数据——放宽到 32m，与 api Fastify bodyLimit 对齐。
  client_max_body_size 32m;

  # SPA：未命中静态文件回退 index.html（前端路由 react-router）
  location / {
    try_files $uri $uri/ /index.html;
  }

  # SSE 端点：关代理缓冲、关 cache、长读超时、HTTP/1.1 长连接（脊柱 §5.1）。
  # 匹配 /api/v1/jobs/{id}/events 与 /api/v1/versions/{id}/structure/events（本期两个 SSE 流）。
  location ~ ^/api/v1/(jobs|versions)/.+/events$ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # 透传上游（边缘 nginx）的 X-Forwarded-Proto；直连本容器（无上游头）时为空，api 回落 req.protocol。
    #   修复：原先写死 $scheme=http，会把边缘的 https 覆盖成 http → connect/pair 算出 http BASE →
    #   助手脚本上传命中 80→443 跳转失败（用户实测）。
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    # 兼容部分中间层缓冲（nginx 自定义头，告知不缓冲）
    add_header X-Accel-Buffering no;
  }

  # —— 试用端 runtime（消费链路）：复用本 nginx，挂 /try/ + /api/v1/runtime/，反代到【跑在宿主】的 runtime-api ——
  #   runtime 是 compose 服务（docker 网络内 runtime:3100），用变量 + resolver 每请求重解析（同 $api_host 口径）。
  #   /api/v1/runtime/agui 是 AG-UI SSE 长连，故整段关缓冲 + 长读超时（普通读不受影响）。^~ 让它优先于下面的 /api/ 与正则。
  location ^~ /api/v1/runtime/ {
    proxy_pass http://$runtime_host:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
    add_header X-Accel-Buffering no;
  }

  # 试用端静态前端（vite base=/try/ 构建产物，docker cp 进 /usr/share/nginx/try）。
  location ^~ /try/ {
    alias /usr/share/nginx/try/;
    try_files $uri $uri/ /try/index.html;
  }

  # 普通 API 反代（同源 Cookie 会话透传，§11.C）
  location /api/ {
    proxy_pass http://$api_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # 透传上游（边缘 nginx）的 X-Forwarded-Proto；直连本容器（无上游头）时为空，api 回落 req.protocol。
    #   修复：原先写死 $scheme=http，会把边缘的 https 覆盖成 http → connect/pair 算出 http BASE →
    #   助手脚本上传命中 80→443 跳转失败（用户实测）。
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # 基础设施探针（不在 /api/v1 前缀，脊柱 §10）
  location ~ ^/(health|ready)$ {
    proxy_pass http://$api_host:3000;
    proxy_set_header Host $host;
  }
}
