# Public edge for the fixed, Basic-Auth-protected Combo Cloud Review slot.
# TLS is added and renewed by certbot on the host. The S3 vhost must preserve
# Host exactly because MinIO verifies it as part of the presigned request.
server {
    listen 80;
    server_name review.43-160-242-46.sslip.io;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:30081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name review-s3.43-160-242-46.sslip.io;

    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:30901;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
